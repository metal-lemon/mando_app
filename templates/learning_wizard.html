            async loadPoolFromAPI() {
                try {
                    const Response = await fetch('/api/build-pool', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            source: this.selectedSource,
                            targetChars: this.targetChars,
                            knownChars: [...this.knownChars]
                        })
                    });
                    if (Response.ok) {
                        const Data = await Response.json();
                        this.pool = Data.pool || [];
                        this.poolThresholds = Data.thresholds;
                        this.poolCoverage = Data.coverage;
                        if (this.currentStep === 3) {
                            this.renderStep();
                        }
                    }
                } catch (e) {
                    console.log('Could not load pool:', e);
                    this.pool = [];
                }
            }

            bindPathfinderEvents() {
                const generatePathBtn = document.getElementById('generatePathBtn');
                if (generatePathBtn) generatePathBtn.addEventListener('click', async () => {
                    generatePathBtn.disabled = true;
                    generatePathBtn.textContent = '⏳ Searching...';
                    
                    const pathStats = document.getElementById('pathStats');
                    if (pathStats) {
                        pathStats.style.display = 'block';
                        pathStats.innerHTML = '<p>🔄 Running beam search...</p>';
                    }

                    await this.loadCharFreq();
                    this.generatePoolV2();
                    
                    await new Promise(resolve => setTimeout(resolve, 50));

                    const result = this.beamSearchPath();
                    const finalResult = this.appendTargetAnchor(result);

                    this.path = finalResult.path;
                    this.coverage = finalResult.coverage;

                    this.updateProgress();

                    if (pathStats) {
                        const coveragePct = (finalResult.coverage * 100).toFixed(1);
                        const isComplete = finalResult.coverage >= 1;
                        pathStats.className = 'file-status ' + (isComplete ? 'success' : 'warning');
                        pathStats.innerHTML = '<strong>📊 Path Results:</strong> Coverage: <strong>' + 
                            coveragePct + '%</strong> | Non-targets introduced: <strong>' + 
                            finalResult.acc_non_size + '</strong>';
                    }

                    this.renderPathResults();
                    
                    generatePathBtn.disabled = false;
                    generatePathBtn.textContent = '⚡ Generate Path (Beam Search)';
                });
            }

            renderPathResults() {
                const pathResults = document.getElementById('pathResults');
                if (pathResults) {
                    pathResults.innerHTML = this.path.length > 0 ? this.renderPathList() : 
                        '<div class="empty-state"><h3>🔍 No path found</h3><p>Try adjusting your target characters.</p></div>';
                }
            }

            generatePoolV2() {
                // Pool is now built server-side via /api/build-pool
                // This method just ensures pool is in the right format for beam search
                
                if (!this.pool || this.pool.length === 0) {
                    return [];
                }

                // Ensure pool items have required fields for beam search
                this.pool = this.pool.map(item => ({
                    id: item.id,
                    title: item.title || 'Untitled',
                    matched_chars: item.matched_chars || [],
                    characters: item.characters || [],
                    targetChars: item.targetChars || [],
                    nontargetChars: item.nontargetChars || [],
                    unknownChars: [...(item.targetChars || []), ...(item.nontargetChars || [])],
                    efficiency: item.efficiency || 0,
                    jumpsize: (item.targetChars?.length || 0) + (item.nontargetChars?.length || 0)
                }));

                return this.pool;
            }

            async loadCharFreq() {
                if (!this.selectedSource) return null;
                
                try {
                    const freqUrl = '/source/' + this.selectedSource + '/' + this.selectedSource + '_freq.json';
                    const Response = await fetch(freqUrl);
                    if (!Response.ok) return null;
                    
                    const freqData = await Response.json();
                    this.charFreq = new Map(Object.entries(freqData));
                    return this.charFreq;
                } catch (e) {
                    console.warn('Could not load character frequency:', e);
                    return null;
                }
            }

            logFreq(char) {
                if (!this.charFreq || !this.charFreq.has(char)) return 0;
                return Math.log(this.charFreq.get(char) + 1);
            }

            beamSearchPath() {
                if (!this.pool || this.pool.length === 0) {
                    return { path: [], coverage: 0 };
                }

                const knownSet = this.knownChars;
                const targetSet = new Set(this.targetChars);
                const totalTargets = targetSet.size;
                const beamWidth = 20;
                const lambda = 0.1;

                let beams = [{
                    sequence: [],
                    covered: new Set(knownSet),
                    acc_non: new Set(),
                    cost: 0
                }];

                const maxDepth = this.pool.length;
                let bestComplete = null;
                let bestPartial = null;

                for (let depth = 0; depth < maxDepth && beams.length > 0; depth++) {
                    const newBeams = [];

                    for (const beam of beams) {
                        for (let i = 0; i < this.pool.length; i++) {
                            if (beam.sequence.includes(i)) continue;

                            const story = this.pool[i];
                            const newTargets = story.targetChars.filter(c => targetSet.has(c) && !beam.covered.has(c));
                            
                            if (newTargets.length === 0) continue;

                            const newNon = story.nontargetChars.filter(c => !beam.acc_non.has(c));
                            
                            const newCovered = new Set(beam.covered);
                            newTargets.forEach(c => newCovered.add(c));

                            const newAccNon = new Set(beam.acc_non);
                            newNon.forEach(c => newAccNon.add(c));

                            const freqBonus = newTargets.reduce((sum, c) => sum + lambda * this.logFreq(c), 0);
                            const adjustedCost = newAccNon.size - freqBonus;

                            newBeams.push({
                                sequence: [...beam.sequence, i],
                                covered: newCovered,
                                acc_non: newAccNon,
                                cost: adjustedCost
                            });
                        }
                    }

                    newBeams.sort((a, b) => a.cost - b.cost);
                    beams = newBeams.slice(0, beamWidth);

                    for (const beam of beams) {
                        const coveredTargets = [...beam.covered].filter(c => targetSet.has(c) && !knownSet.has(c)).length;
                        const coverage = coveredTargets / totalTargets;

                        if (coverage === 1) {
                            if (!bestComplete || beam.cost < bestComplete.cost) {
                                bestComplete = { ...beam, coverage: 1 };
                            }
                        } else if (!bestPartial || beam.cost < bestPartial.cost) {
                            bestPartial = { ...beam, coverage: coverage };
                        }
                    }
                }

                const result = bestComplete || bestPartial;
                if (!result) {
                    return { path: [], coverage: 0 };
                }

                const path = result.sequence.map(idx => ({
                    id: this.pool[idx].id,
                    title: this.pool[idx].title,
                    source: this.selectedSource,
                    content: this.pool[idx].content,
                    matched_chars: this.pool[idx].matched_chars,
                    chars: this.pool[idx].characters,
                    newChars: this.pool[idx].unknownChars,
                    targetChars: this.pool[idx].targetChars,
                    nontargetChars: this.pool[idx].nontargetChars
                }));

                return { 
                    path: path, 
                    coverage: result.coverage,
                    acc_non_size: result.acc_non.size
                };
            }

            appendTargetAnchor(pathResult) {
                const knownSet = new Set(this.knownChars);
                pathResult.path.forEach(s => {
                    s.newChars.forEach(c => knownSet.add(c));
                });

                const targetSet = new Set(this.targetChars);
                const remainingTargets = [...targetSet].filter(c => !knownSet.has(c));

                if (remainingTargets.length === 0) {
                    pathResult.path.push({
                        id: 'target-anchor',
                        title: this.targetText || 'Target Text',
                        source: this.selectedSource,
                        content: this.targetText || '',
                        matched_chars: this.targetChars,
                        chars: [...this.targetChars],
                        newChars: [],
                        targetChars: [],
                        nontargetChars: [],
                        isAnchor: true
                    });
                }

                return pathResult;
            }

            renderPathList() {
                if (this.path.length === 0) {
                    return '<p style="color: #999;">No optimal path found. Some characters may be unreachable.</p>';
                }

                const targetSet = new Set(this.targetChars);
                let cumulativeKnown = new Set(this.knownChars);
                
                const pathInfo = this.path.map((story, i) => {
                    const newChars = story.newChars || [];
                    const fromPrev = i > 0 ? newChars.filter(c => cumulativeKnown.has(c)).length : 0;
                    const newThis = newChars.length;
                    
                    newChars.forEach(c => cumulativeKnown.add(c));
                    
                    const remaining = [...targetSet].filter(c => !cumulativeKnown.has(c)).length;
                    
                    return { fromPrev, newThis, remaining };
                });

                return `
                    <h3 style="margin: 20px 0 15px 0; color: #333;">📚 Your Learning Path</h3>
                    <p style="color: #666; margin-bottom: 20px;">
                        ${this.path.length} stepping stone${this.path.length > 1 ? 's' : ''} to reach your goal
                    </p>
                    <ul class="path-list">
                        ${this.path.map((story, i) => `
                            <li class="path-item ${i === this.path.length - 1 ? 'final' : ''}">
                                <div class="path-number">${i + 1}</div>
                                <div class="path-info">
                                    <h4>${story.title}</h4>
                                    <p>${story.source || 'Unknown source'} • ${story.chars.length} total characters</p>
                                    ${pathInfo[i].fromPrev > 0 ? `
                                        <div class="overlap-info">
                                            <span class="overlap-badge">🔄 ${pathInfo[i].fromPrev} chars overlap</span>
                                            <span>with previous lesson (great for reinforcement!)</span>
                                        </div>
                                    ` : ''}
                                </div>
                                <div class="path-stats">
                                    <div class="path-stat">
                                        <div class="value" style="color: var(--secondary);">+${pathInfo[i].newThis}</div>
                                        <div class="label">New Chars</div>
                                    </div>
                                    <div class="path-stat">
                                        <div class="value" style="color: ${pathInfo[i].remaining > 0 ? 'var(--warning)' : 'var(--secondary)'};">${pathInfo[i].remaining}</div>
                                        <div class="label">Remaining</div>
                                    </div>
                                </div>
                            </li>
                        `).join('')}
                    </ul>
                    <div class="button-group" style="margin-top: 20px;">
                        <button id="rebuildPathBtn" class="outline">🔄 Rebuild Path</button>
                    </div>
                `;
            }

            // ==================== STEP 4: CURRICULUM ====================
            renderCurriculum(container) {
                const hasCurriculum = this.curriculum && this.curriculum.length > 0;
                
                container.innerHTML = `
                    <h2><span class="step-num">4</span> Build Your Curriculum</h2>
                    <p class="step-description">
                        Generate self-study lessons for each story in your path. Each lesson includes stroke order practice,
                        5 words per character, and word lists extracted from the story text.
                    </p>

                    <div class="info-box" style="background: #e3f2fd; border-color: #2196F3;">

                document.getElementById('generateCurriculumBtn').addEventListener('click', async () => {
                    const btn = document.getElementById('generateCurriculumBtn');
                    const contentDiv = document.getElementById('curriculumContent');
                    btn.disabled = true;
                    btn.textContent = '🔄 Generating...';
                    
                    contentDiv.innerHTML = `
                        <div class="info-box" style="background: #e3f2fd; border-color: #2196F3;">
                            <div id="progressMessage">Starting...</div>

                                <div class="progress-fill" id="progressFill" style="width: 0%;"></div>

                    `;
                    
                    await this.generateCurriculumForPath((progress) => {
                        if (progress.stage === 'complete') {

            bindCollapsibleLessons() {
                document.querySelectorAll('.lesson-header').forEach(header => {
                    header.addEventListener('click', () => {
                        const card = header.closest('.lesson-card');
                        const content = card.querySelector('.lesson-content');

                        if (content.style.display === 'none') {

            async segmentText(text, mode = 'accurate') {
                try {
                    const Response = await fetch('/api/segment', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ text: text, mode: mode })
                    });
                    if (Response.ok) {
                        const Data = await Response.json();
                        return Data.words || [];
                    }
                } catch (e) {
                    console.log('Segment error:', e);
                }
                return [];
            }

            async generateCurriculumForPath(onProgress) {
                this.curriculum = [];
                
                if (onProgress) onProgress({ stage: 'loading_content', message: 'Loading story content...' });
                const fullContent = await this.loadFullContent();
                
                const targetSet = new Set(this.targetChars);
                let cumulativeKnown = new Set(this.knownChars);
                
                for (let i = 0; i < this.path.length; i++) {
                    const pathItem = this.path[i];
                    const fullStory = fullContent.find(c => String(c.id) === String(pathItem.id)) || {};
                    
                    console.log('Story', i, '- ID:', pathItem.id, 'Title:', pathItem.title);
                    console.log('  Content found:', (fullStory.content || 'EMPTY').substring(0, 50));
                    
                    const storyChars = new Set(pathItem.chars || []);
                    const newCharsThisLesson = [...storyChars].filter(c => !cumulativeKnown.has(c));
                    const targetCharsThisLesson = newCharsThisLesson.filter(c => targetSet.has(c));
                    
                    const Content = fullStory.content;
                    const wordsInStory = await this.segmentText(Content);
                    
                    if (onProgress) onProgress({ 
                        stage: 'fetching_words', 
                        message: `Finding words for story ${i + 1}/${this.path.length}...`,
                        progress: Math.round(((i + 1) / this.path.length) * 80)
                    });
                    
                    const knownArray = Array.from(cumulativeKnown);
                    const allCharsForThisLesson = [...knownArray, ...newCharsThisLesson];
                    const apiResult = await this.fetchLearnableWords(allCharsForThisLesson);
                    const wordList = apiResult.words || [];
                    
                    const charWordMap = {};
                    for (const char of newCharsThisLesson) {
                        const words = wordList
                            .filter(w => w.word && w.word.includes(char))
                            .slice(0, 5)
                            .map(w => ({
                                word: w.word,
                                pinyin: w.pinyin || '',
                                definition: w.meaning || w.definition || ''
                            }));
                        charWordMap[char] = words;
                    }
                    
                    this.curriculum.push({
                        index: i,
                        storyId: pathItem.id,
                        title: pathItem.title || 'Story ' + (i + 1),
                        content: Content,
                        newChars: newCharsThisLesson,
                        targetChars: targetCharsThisLesson,
                        knownBefore: [...cumulativeKnown],
                        charWordMap: charWordMap,
                        wordsInStory: wordsInStory.slice(0, 30),
                        isTarget: false
                    });
                    
                    newCharsThisLesson.forEach(c => cumulativeKnown.add(c));
                }
                
                const coveredTargets = new Set();
                this.curriculum.forEach(l => {
                    l.targetChars.forEach(c => coveredTargets.add(c));
                });
                const remainingTargets = this.targetChars.filter(c => !coveredTargets.has(c));
                
                if (remainingTargets.length > 0) {
                    if (onProgress) onProgress({ stage: 'processing_target', message: 'Processing target text...' });
                    
                    const knownArray = Array.from(cumulativeKnown);
                    const allCharsForTarget = [...knownArray, ...remainingTargets];
                    const apiResult = await this.fetchLearnableWords(allCharsForTarget);
                    const wordList = apiResult.words || [];
                    
                    const charWordMap = {};
                    for (const char of remainingTargets) {
                        const words = wordList
                            .filter(w => w.word && w.word.includes(char))
                            .slice(0, 5)
                            .map(w => ({
                                word: w.word,
                                pinyin: w.pinyin || '',
                                definition: w.meaning || w.definition || ''
                            }));
                        charWordMap[char] = words;
                    }
                    
                    this.curriculum.push({
                        index: this.curriculum.length,
                        storyId: 'target',
                        title: 'Your Target Text',
                        content: this.targetText,
                        newChars: remainingTargets,
                        targetChars: remainingTargets,
                        knownBefore: [...cumulativeKnown],
                        charWordMap: charWordMap,
                        wordsInStory: (await this.segmentText(this.targetText)).slice(0, 30),
                        isTarget: true
                    });
                }
                
                if (onProgress) onProgress({ stage: 'complete', message: 'Done!' });
                localStorage.setItem(WIZARD_STORAGE.CURRICULUM, JSON.stringify(this.curriculum));
            }
            
            async fetchLearnableWords(chars) {
                try {
                    const Response = await fetch('/api/learnable-words', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ chars: chars })
                    });
                    if (Response.ok) {
                        return await Response.json();
                    }
                } catch (e) {
                    console.log('Error fetching learnable words:', e);
                }
                return { words: [] };
            }

            shuffle(array) {
                const arr = [...array];
                for (let i = arr.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [arr[i], arr[j]] = [arr[j], arr[i]];
                }
                return arr;
            }

            async startQuiz() {
                const allNewChars = [];
                const charSet = new Set();
                
                const orderedStories = this.optimizedPath?.perm || this.path;
                
                for (const storyItem of orderedStories) {
                    const unknownChars = storyItem.newChars || [];
                    for (const char of unknownChars) {
                        if (!charSet.has(char)) {
                            charSet.add(char);
                            allNewChars.push({
                                char: char,
                                storyIndex: orderedStories.indexOf(storyItem),
                                storyTitle: storyItem.title || 'Story',
                                isTarget: this.targetChars.includes(char)
                            });
                        }
                    }
                }
                
                let hskChars = [];
                try {
                    const Response = await fetch('/data/hsk_characters.json');
                    if (Response.ok) {
                        const Data = await Response.json();
                        hskChars = Data.all || [];
                    }
                } catch (e) {
                    console.log('Could not load HSK characters:', e);
                    hskChars = ['的', '是', '了', '我', '在', '有', '和', '人', '这', '中', '大', '为', '上', '个', '们', '来', '时', '年', '国', '会', '出', '也', '子', '得', '她', '地', '前', '道', '业', '生', '把', '外', '政', '行', '所', '家', '后', '儿', '经', '进', '面', '关', '点', '定', '天', '分', '还', '下', '用', '发', '心', '只', '么', '起', '都', '好', '小', '部', '其', '些', '当', '样', '现', '应', '最', '重', '间', '女', '真', '被', '文', '但', '身', '公', '义', '从', '像'];
                }
                
                const excluded = new Set([...charSet, ...this.knownChars]);
                let availableDistractors = hskChars.filter(c => !excluded.has(c));
                
                if (availableDistractors.length < 15) {
                    availableDistractors = [...availableDistractors, ...hskChars.filter(c => !charSet.has(c))];
                    availableDistractors = [...new Set(availableDistractors)];
                }
                
                const pairs = [];
                for (let i = 0; i < allNewChars.length; i += 2) {
                    if (i + 1 < allNewChars.length) {
                        pairs.push([allNewChars[i], allNewChars[i + 1]]);
                    } else {
                        pairs.push([allNewChars[i]]);
                    }
                }
                
                const questions = pairs.map((pair, idx) => {
                    const targets = pair.map(p => p.char);
                    const numDistractors = 5 - targets.length;
                    const shuffledDistractors = this.shuffle(availableDistractors);
                    const distractors = shuffledDistractors.slice(0, numDistractors);
                    
                    const allOptions = this.shuffle([...targets, ...distractors]);
                    
                    return {
                        id: idx,
                        targets: targets,
                        distractors: distractors,
                        options: allOptions,
                        userSelection: [],
                        storyTitle: pair[0].storyTitle,
                        isTarget: pair.some(p => p.isTarget)
                    };
                });
                
                const maxQuestions = Math.min(15, questions.length);
                const sample = questions.slice(0, maxQuestions);
                
                this.currentQuiz = {
                    index: 0,
                    questions: sample,
                    answers: {},
                    perCharResult: {}
                };
            }

            bindQuizEvents() {
                document.querySelectorAll('.quiz-char-option').forEach(opt => {
                    opt.addEventListener('click', () => {
                        const char = opt.dataset.char;
                        const q = this.currentQuiz.questions[this.currentQuiz.index];
                        
                        if (!q.userSelection) q.userSelection = [];
                        
                        const idx = q.userSelection.indexOf(char);
                        if (idx > -1) {
                            q.userSelection.splice(idx, 1);
                            opt.classList.remove('selected');
                        } else {
                            q.userSelection.push(char);
                            opt.classList.add('selected');
                        }
                        
                        document.getElementById('selectedCount').textContent = q.userSelection.length;
                    });
                });

                document.getElementById('skipBtn').addEventListener('click', () => {
                    const q = this.currentQuiz.questions[this.currentQuiz.index];
                    q.userSelection = [];
                    this.currentQuiz.index++;
                    this.renderStep();
                });

                document.getElementById('submitBtn').addEventListener('click', () => {
                    const q = this.currentQuiz.questions[this.currentQuiz.index];
                    const selected = q.userSelection || [];
                    const targets = q.targets;
                    
                    const correctSelection = targets.every(t => selected.includes(t));
                    const noWrongSelection = selected.every(s => targets.includes(s));
                    const isFullyCorrect = correctSelection && noWrongSelection;
                    
                    q.isCorrect = isFullyCorrect;
                    q.partialCorrect = correctSelection && !noWrongSelection;
                    
                    document.querySelectorAll('.quiz-char-option').forEach(opt => {
                        const char = opt.dataset.char;
                        opt.classList.remove('selected');
                        if (targets.includes(char)) {
                            opt.classList.add('correct-answer');
                        } else if (selected.includes(char)) {
                            opt.classList.add('wrong-answer');
                        }
                    });
                    
                    document.getElementById('submitBtn').disabled = true;
                    document.getElementById('nextQuestionBtn').disabled = false;
                    
                    if (q.isCorrect) {
                        const feedback = document.createElement('div');
                        feedback.className = 'quiz-feedback success';
                        feedback.textContent = '✓ Perfect! You selected exactly the right characters!';
                        document.querySelector('.quiz-card').appendChild(feedback);
                    } else if (q.partialCorrect) {
                        const feedback = document.createElement('div');
                        feedback.className = 'quiz-feedback partial';
                        feedback.textContent = `⚠ Good start! You knew ${selected.filter(s => targets.includes(s)).length} of ${targets.length} characters.`;
                        document.querySelector('.quiz-card').appendChild(feedback);
                    } else {
                        const feedback = document.createElement('div');
                        feedback.className = 'quiz-feedback incorrect';
                        const known = selected.filter(s => targets.includes(s)).length;
                        const wrong = selected.filter(s => !targets.includes(s)).length;
                        let msg = '';
                        if (known > 0) msg += `You knew ${known} character(s). `;
                        if (wrong > 0) msg += `But ${wrong} was not from your learning path.`;
                        feedback.textContent = msg || '✗ Those characters are not from your learning path.';
                        document.querySelector('.quiz-card').appendChild(feedback);
                    }
                });

                document.getElementById('nextQuestionBtn').addEventListener('click', () => {
                    if (this.currentQuiz.index < this.currentQuiz.questions.length) {
                        this.currentQuiz.index++;
                        this.renderStep();
                    }
                });
            }

            showQuizResults(container) {
                let fullyCorrect = 0;
                let partialCorrect = 0;
                const missedChars = new Set();
                const correctChars = new Set();
                
                for (const q of this.currentQuiz.questions) {
                    if (q.isCorrect) {
                        fullyCorrect++;
                        q.targets.forEach(t => correctChars.add(t));
                    } else if (q.partialCorrect) {
                        partialCorrect++;
                        q.targets.forEach(t => {
                            if (q.userSelection.includes(t)) {
                                correctChars.add(t);
                            } else {
                                missedChars.add(t);
                            }
                        });
                    } else {
                        q.targets.forEach(t => missedChars.add(t));
                    }
                }

                this.quizResults = {
                    correct: fullyCorrect,
                    partial: partialCorrect,
                    total: this.currentQuiz.questions.length,
                    missed: Array.from(missedChars),
                    correctChars: Array.from(correctChars)
                };

                localStorage.setItem(WIZARD_STORAGE.QUIZ_RESULTS, JSON.stringify(this.quizResults));
                this.updateSummary();

                const totalCorrect = fullyCorrect + partialCorrect;
                const pct = Math.round((totalCorrect / this.currentQuiz.questions.length) * 100);
                let message = '';
                if (pct >= 80) message = 'Great job! You\'re ready to continue.';
                else if (pct >= 60) message = 'Good progress! Review the missed characters.';
                else message = 'Keep practicing! Review the curriculum and try again.';

                container.innerHTML = `
                    <h2><span class="step-num">5</span> Test Complete!</h2>
                    
                    <div class="completion-card" style="background: linear-gradient(135deg, var(--primary) 0%, var(--purple) 100%);">
                        <div class="celebration">${pct >= 80 ? '🎉' : '📚'}</div>
                        <h2>${totalCorrect} / ${this.currentQuiz.questions.length}</h2>
                        <p>${pct}% correct • ${message}</p>
                    </div>

                    <div class="quiz-summary-stats">
                        <div class="stat-card" style="background: linear-gradient(135deg, var(--secondary) 0%, var(--secondary-dark) 100%);">
                            <div class="stat-value">${correctChars.size}</div>
                            <div class="stat-label">Chars Known</div>
                        </div>
                        <div class="stat-card" style="background: linear-gradient(135deg, var(--warning) 0%, #f57c00 100%);">
                            <div class="stat-value">${missedChars.size}</div>
                            <div class="stat-label">Need Practice</div>
                        </div>
                    </div>

                    ${missedChars.size > 0 ? `
                        <h3 style="margin: 25px 0 15px 0; color: #333;">Characters to Review</h3>
                        <div class="char-grid">
                            ${Array.from(missedChars).map(ch => `<span class="char-tile unknown">${ch}</span>`).join('')}
                        </div>
                        <p style="color: #666; margin-top: 10px;">
                            These characters will NOT be added to your known set. Review them and try again!
                        </p>
                    ` : ''}

                    <div class="button-group" style="margin-top: 25px;">
                        <button id="retryQuizBtn" class="outline">🔄 Retry Quiz</button>
                        <button id="practiceMissedBtn" class="secondary" ${missedChars.size === 0 ? 'disabled' : ''}>✏️ Practice Missed</button>
                    </div>
                `;

                document.getElementById('retryQuizBtn').addEventListener('click', () => {
                    this.quizResults = { correct: 0, partial: 0, total: 0, missed: [], correctChars: [] };
                    this.currentQuiz = { index: 0, questions: [], answers: {}, perCharResult: {} };
                    this.renderStep();
                });

                document.getElementById('practiceMissedBtn').addEventListener('click', async () => {
                    const missedArr = Array.from(missedChars);
                    if (missedArr.length > 0) {
                        this.currentQuiz.questions = missedArr.map((c, idx) => {
                            const isTarget = this.targetChars.includes(c);
                            return {
                                id: idx,
                                targets: [c],
                                distractors: [],
                                options: [c],
                                userSelection: [],
                                storyTitle: 'Review',
                                isTarget: isTarget
                            };
                        });
                        this.currentQuiz.index = 0;
                        this.currentQuiz.answers = {};
                        this.currentQuiz.perCharResult = {};
                        this.renderStep();
                    }
                });

                this.updateProgress();
            }

            // ==================== STEP 6: COMPLETE ====================
            renderComplete(container) {
                const correctChars = this.quizResults.correctChars || [];
                const missed = this.quizResults.missed || [];
                const totalLearned = correctChars.length;
                const pctKnown = this.quizResults.total > 0

                container.innerHTML = `

                        <h3>📊 Quiz Results Summary</h3>
                        <div class="apply-stats">
                            <div class="apply-stat success">
                                <span class="stat-num">${correctChars.length}</span>
                                <span class="stat-label">Know</span>
                            </div>
                            <div class="apply-stat warning">
                                <span class="stat-num">${missed.length}</span>
                                <span class="stat-label">Need Practice</span>
                            </div>
                            <div class="apply-stat">
                                <span class="stat-num">${this.path.length}</span>
                                <span class="stat-label">Stories</span>
                            </div>
                        </div>
                        
                        ${missed.length > 0 ? `
                            <div class="missed-warning">
                                <p>⚠️ <strong>${missed.length} characters</strong> were not answered correctly in the quiz.</p>
                                <p>These will NOT be added to your known set.</p>
                            </div>
                        ` : ''}
                    </div>

                    ${correctChars.length > 0 ? `
                        <div class="curriculum-section" style="margin-top: 25px;">
                            <h4>✨ Characters to Add to Your Known Set</h4>
                            <div class="char-grid">
                                ${correctChars.map(ch => `<span class="char-tile known">${ch}</span>`).join('')}
                            </div>
                        </div>
                    ` : ''}

                    ${missed.length > 0 ? `
                        <div class="curriculum-section" style="margin-top: 25px; border-color: var(--warning);">
                            <h4>📚 Characters Needing More Practice</h4>
                            <p style="color: #666; font-size: 14px; margin-bottom: 10px;">
                                Review these characters and try the quiz again before adding them.
                            </p>
                            <div class="char-grid">
                                ${missed.map(ch => `<span class="char-tile unknown">${ch}</span>`).join('')}
                            </div>
                        </div>
                    ` : ''}

                    <div class="button-group" style="margin-top: 25px;">
                        <button id="addToKnownBtn" class="secondary" ${correctChars.length === 0 ? 'disabled' : ''}>
                            ✨ Add ${correctChars.length} Characters to Known Set
                        </button>
                        <button id="retryMissedBtn" class="outline" ${missed.length === 0 ? 'disabled' : ''}>
                            🔄 Retry Missed Characters
                        </button>
                        <button id="exportSessionBtn" class="outline">📤 Export Session</button>
                        <button id="startNewBtn">🔄 Start New Session</button>
                    </div>

                    <div id="addedStatus" class="file-status success hidden" style="margin-top: 20px;"></div>
                `;

                this.bindCompleteEvents();
            }

            bindCompleteEvents() {
                document.getElementById('addToKnownBtn')?.addEventListener('click', () => {
                    const correctChars = this.quizResults.correctChars || [];
                    const missed = this.quizResults.missed || [];
                    
                    correctChars.forEach(ch => this.knownChars.add(ch));
                    window.mandarinState.setCharacters(Array.from(this.knownChars));
                    
                    const statusDiv = document.getElementById('addedStatus');
                    statusDiv.classList.remove('hidden');
                    statusDiv.innerHTML = `
                        <h4>✅ Added ${correctChars.length} Characters!</h4>
                        <p>Your known character count is now: <strong>${this.knownChars.size}</strong></p>
                        ${missed.length > 0 ? `
                            <p style="margin-top: 10px;">Don't worry about the ${missed.length} missed characters - 
                            keep practicing and try again!</p>
                        ` : ''}
                    `;
                    
                    document.getElementById('addToKnownBtn').disabled = true;
                    document.getElementById('addToKnownBtn').textContent = '✓ Added!';
                    
                    this.updateSummary();
                });

                document.getElementById('retryMissedBtn')?.addEventListener('click', () => {
                    const missed = this.quizResults.missed || [];
                    if (missed.length > 0) {
                        this.currentQuiz.questions = missed.map((c, idx) => ({
                            id: idx,
                            targets: [c],
                            distractors: [],
                            options: [c],
                            userSelection: [],
                            storyTitle: 'Review',
                            isTarget: this.targetChars.includes(c)
                        }));
                        this.currentQuiz.index = 0;
                        this.currentQuiz.answers = {};
                        this.currentQuiz.perCharResult = {};
                        this.quizResults = { correct: 0, partial: 0, total: 0, missed: [], correctChars: [] };
                        this.currentStep = 5;
                        this.renderStep();
                    }
                });

                document.getElementById('exportSessionBtn')?.addEventListener('click', () => {
                    const sessionData = {
                        date: new Date().toISOString(),
                        knownChars: Array.from(this.knownChars),
                        targetText: this.targetText,
                        learnedChars: this.quizResults.correctChars || [],
                        missedChars: this.quizResults.missed || [],
                        path: this.path,
                        curriculum: this.curriculum,
                        quizResults: this.quizResults
                    };
                    
                    const Blob = new Blob([JSON.stringify(sessionData, null, 2)], { type: 'application/json' });
                    const Url = URL.createObjectURL(Blob);
                    const a = document.createElement('a');
                    a.href = Url;
                    a.download = `learning_session_${new Date().toISOString().slice(0,10)}.json`;
                    a.click();
                    URL.revokeObjectURL(Url);
                });

                document.getElementById('startNewBtn')?.addEventListener('click', () => {
                    if (confirm('Start a new learning session? Current progress will be saved.')) {
                        this.resetWizard();
                    }
                });
            }

            resetWizard() {
                this.targetText = '';
                this.targetChars = [];
                this.unknownChars = [];
                this.path = [];
                this.curriculum = [];
                this.pool = [];
                this.clusters = [];
                this.selectedCluster = null;
                this.optimizedPath = null;
                this.quizResults = { correct: 0, total: 0, missed: [], correctChars: [] };
                this.currentQuiz = { index: 0, questions: [], answers: {}, perCharResult: {} };
                
                localStorage.removeItem(WIZARD_STORAGE.PATH);
                localStorage.removeItem(WIZARD_STORAGE.CURRICULUM);
                localStorage.removeItem(WIZARD_STORAGE.QUIZ_RESULTS);
                localStorage.removeItem(WIZARD_STORAGE.SELECTED_CLUSTER);
                
                this.currentStep = 1;
                this.updateSummary();
                this.renderStep();
            }
        }

        const wizard = new LearningWizard();
    </script>
</body>
</html>
