<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learning Wizard - Guided Path to Chinese Reading</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✨</text></svg>">
    <script src="/static/js/shared_state.js"></script>
    <style>
        :root {
            --primary: #667eea;
            --primary-dark: #5a67d8;
            --secondary: #48bb78;
            --secondary-dark: #38a169;
            --danger: #f56565;
            --warning: #ff9800;
            --purple: #764ba2;
            --teal: #11998e;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #e9edf2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        .header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--purple) 100%);
            color: white;
            padding: 20px 30px;
            border-radius: 15px;
            margin-bottom: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .header h1 { margin: 0 0 5px 0; font-size: 1.8rem; }
        .header p { margin: 0; opacity: 0.9; font-size: 0.95rem; }
        .home-btn {
            background-color: rgba(255,255,255,0.2);
            color: white;
            border: 1px solid white;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            text-decoration: none;
            display: inline-block;
            transition: background-color 0.3s;
        }
        .home-btn:hover { background-color: rgba(255,255,255,0.3); }

        .progress-container {
            background: white;
            border-radius: 15px;
            padding: 25px 30px;
            margin-bottom: 25px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .progress-steps {
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
            margin-top: 15px;
        }

        .progress-line {
            position: absolute;
            top: 20px;
            left: 40px;
            right: 40px;
            height: 4px;
            background: #e0e0e0;
            border-radius: 2px;
            z-index: 1;
        }

        .progress-line-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--purple));
            border-radius: 2px;
            transition: width 0.4s ease;
        }

        .step-indicator {
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .step-circle {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #e0e0e0;
            color: #999;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 16px;
            transition: all 0.3s ease;
        }

        .step-indicator.completed .step-circle {
            background: var(--secondary);
            color: white;
        }

        .step-indicator.current .step-circle {
            background: var(--primary);
            color: white;
            transform: scale(1.15);
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.3);
        }

        .step-label {
            font-size: 12px;
            color: #666;
            text-align: center;
            max-width: 70px;
        }

        .step-indicator.completed .step-label { color: var(--secondary); }
        .step-indicator.current .step-label { color: var(--primary); font-weight: 600; }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 280px;
            gap: 25px;
        }

        @media (max-width: 900px) {
            .main-content { grid-template-columns: 1fr; }
            .sidebar { order: -1; }
        }

        .step-content {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            min-height: 500px;
        }

        .step-content h2 {
            color: var(--primary);
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .step-content h2 .step-num {
            background: var(--primary);
            color: white;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
        }

        .step-description {
            color: #666;
            margin-bottom: 25px;
            line-height: 1.6;
        }

        .sidebar {
            position: sticky;
            top: 20px;
        }

        .summary-card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }

        .summary-card h3 {
            color: #333;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid var(--primary);
            font-size: 1rem;
        }

        .summary-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #eee;
            font-size: 14px;
        }

        .summary-item:last-child { border-bottom: none; }
        .summary-label { color: #666; }
        .summary-value { font-weight: 600; color: #333; }
        .summary-value.highlight { color: var(--primary); }

        .navigation {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 25px;
        }

        button {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 15px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 500;
        }

        button:hover { background-color: var(--primary-dark); }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        button.secondary { background-color: var(--secondary); }
        button.secondary:hover { background-color: var(--secondary-dark); }
        button.danger { background-color: var(--danger); }
        button.warning { background-color: var(--warning); }
        button.outline {
            background: transparent;
            border: 2px solid var(--primary);
            color: var(--primary);
        }
        button.outline:hover { background: var(--primary); color: white; }

        .button-group { display: flex; gap: 10px; flex-wrap: wrap; margin: 15px 0; }

        textarea {
            width: 100%;
            min-height: 150px;
            padding: 15px;
            font-size: 16px;
            font-family: monospace;
            border: 2px solid #ddd;
            border-radius: 10px;
            resize: vertical;
            margin: 10px 0;
        }
        textarea:focus { outline: none; border-color: var(--primary); }

        input[type="text"], input[type="number"] {
            padding: 12px 15px;
            font-size: 16px;
            border: 2px solid #ddd;
            border-radius: 8px;
            width: 100%;
        }
        input[type="text"]:focus, input[type="number"]:focus { outline: none; border-color: var(--primary); }

        .file-status {
            background-color: #e3f2fd;
            padding: 12px 15px;
            border-radius: 8px;
            margin: 15px 0;
            border-left: 4px solid #2196F3;
        }
        .file-status.success { background-color: #e8f5e9; border-left-color: var(--secondary); }
        .file-status.error { background-color: #ffebee; border-left-color: var(--danger); }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin: 20px 0;
        }

        .stat-card {
            background: linear-gradient(135deg, var(--primary) 0%, var(--purple) 100%);
            color: white;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
        }

        .stat-card .stat-value {
            font-size: 2.5rem;
            font-weight: bold;
            margin: 5px 0;
        }

        .stat-card .stat-label {
            font-size: 12px;
            opacity: 0.9;
        }

        .char-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin: 15px 0;
            max-height: 300px;
            overflow-y: auto;
            padding: 10px;
            background: #f9f9f9;
            border-radius: 10px;
        }

        .char-tile {
            background: #e0e7ff;
            padding: 8px 12px;
            border-radius: 20px;
            font-size: 16px;
            font-family: monospace;
            cursor: pointer;
            transition: all 0.2s;
        }

        .char-tile:hover { transform: scale(1.05); }
        .char-tile.known { background: #c8e6c9; color: #2e7d32; }
        .char-tile.unknown { background: #ffcdd2; color: #c62828; }
        .char-tile.target { background: #fff3e0; color: #e65100; }

        .char-input-group {
            display: flex;
            gap: 10px;
            margin: 15px 0;
            align-items: center;
        }

        .char-input-group input { width: 80px; text-align: center; font-size: 24px; }

        .info-box {
            background: #fff3e0;
            border: 2px solid var(--warning);
            border-radius: 10px;
            padding: 15px;
            margin: 15px 0;
        }

        .info-box h4 { margin: 0 0 10px 0; color: #e65100; }

        .tab-container {
            margin: 20px 0;
        }

        .tab-buttons {
            display: flex;
            gap: 5px;
            margin-bottom: 15px;
        }

        .tab-btn {
            padding: 10px 20px;
            background: #f5f5f5;
            border: none;
            border-radius: 8px 8px 0 0;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }

        .tab-btn.active {
            background: var(--primary);
            color: white;
        }

        .tab-content {
            display: none;
            padding: 20px;
            background: #f9f9f9;
            border-radius: 0 10px 10px 10px;
        }

        .tab-content.active { display: block; }

        .story-card {
            background: white;
            border: 2px solid #eee;
            border-radius: 12px;
            padding: 20px;
            margin: 15px 0;
            cursor: pointer;
            transition: all 0.2s;
        }

        .story-card:hover { border-color: var(--primary); transform: translateY(-2px); }
        .story-card.selected { border-color: var(--secondary); background: #f0fff0; }

        .story-card h4 { margin: 0 0 10px 0; color: #333; }
        .story-card .story-meta { font-size: 13px; color: #666; margin-bottom: 10px; }
        .story-card .story-stats { display: flex; gap: 15px; font-size: 14px; }
        .story-card .stat { display: flex; align-items: center; gap: 5px; }
        .stat.positive { color: var(--secondary); }
        .stat.negative { color: var(--danger); }
        .stat.neutral { color: #666; }

        .path-list {
            list-style: none;
            padding: 0;
        }

        .path-item {
            background: white;
            border: 2px solid #eee;
            border-radius: 12px;
            padding: 20px;
            margin: 15px 0;
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .path-item.final {
            border-color: var(--secondary);
            background: linear-gradient(135deg, #e8f5e9 0%, #c8e6c9 100%);
        }

        .path-number {
            width: 50px;
            height: 50px;
            background: var(--primary);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: bold;
            flex-shrink: 0;
        }

        .path-item.final .path-number { background: var(--secondary); }

        .path-info { flex: 1; }
        .path-info h4 { margin: 0 0 5px 0; }
        .path-info p { margin: 0; color: #666; font-size: 14px; }

        .path-stats {
            display: flex;
            gap: 15px;
            flex-shrink: 0;
        }

        .path-stat {
            text-align: center;
            padding: 10px 15px;
            background: #f5f5f5;
            border-radius: 8px;
        }

        .path-stat .value { font-size: 1.5rem; font-weight: bold; color: var(--primary); }
        .path-stat .label { font-size: 11px; color: #666; }

        .quiz-container { margin: 20px 0; }

        .quiz-card {
            background: white;
            border: 2px solid #eee;
            border-radius: 15px;
            padding: 30px;
            text-align: center;
            margin: 20px 0;
        }

        .quiz-char {
            font-size: 5rem;
            margin: 20px 0;
            color: #333;
        }

        .quiz-options {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-top: 30px;
        }

        .quiz-option {
            padding: 15px;
            background: #f5f5f5;
            border: 2px solid #ddd;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 16px;
        }

        .quiz-option:hover { border-color: var(--primary); }
        .quiz-option.correct { background: #c8e6c9; border-color: var(--secondary); }
        .quiz-option.incorrect { background: #ffcdd2; border-color: var(--danger); }
        .quiz-option.selected { background: #e0e7ff; border-color: var(--primary); }

        .quiz-progress {
            margin: 20px 0;
        }

        .progress-bar {
            width: 100%;
            height: 10px;
            background: #e0e0e0;
            border-radius: 5px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            transition: width 0.3s ease;
        }

        .quiz-nav {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 20px;
        }

        .quiz-char-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 15px;
            margin: 25px auto;
            max-width: 500px;
        }

        .quiz-char-option {
            font-size: 2.5rem;
            padding: 20px;
            background: #f5f5f5;
            border: 3px solid #ddd;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            user-select: none;
        }

        .quiz-char-option:hover {
            border-color: var(--primary);
            background: #f0f4ff;
            transform: translateY(-2px);
        }

        .quiz-char-option.selected {
            background: #e0e7ff;
            border-color: var(--primary);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
        }

        .quiz-char-option.correct-answer {
            background: #c8e6c9;
            border-color: var(--secondary);
            color: #2e7d32;
        }

        .quiz-char-option.wrong-answer {
            background: #ffcdd2;
            border-color: var(--danger);
            color: #c62828;
        }

        .quiz-hint {
            margin-top: 15px;
            color: #666;
            font-size: 14px;
        }

        .quiz-feedback {
            padding: 15px;
            margin-top: 20px;
            border-radius: 8px;
            font-weight: 500;
        }

        .quiz-feedback.success {
            background: #e8f5e9;
            color: #2e7d32;
            border: 1px solid #a5d6a7;
        }

        .quiz-feedback.partial {
            background: #fff3e0;
            color: #e65100;
            border: 1px solid #ffcc80;
        }

        .quiz-feedback.incorrect {
            background: #ffebee;
            color: #c62828;
            border: 1px solid #ef9a9a;
        }

        .completion-card {
            background: linear-gradient(135deg, var(--secondary) 0%, var(--secondary-dark) 100%);
            color: white;
            border-radius: 15px;
            padding: 40px;
            text-align: center;
            margin: 30px 0;
        }

        .completion-card h2 { font-size: 2rem; margin-bottom: 15px; }
        .completion-card p { opacity: 0.9; margin-bottom: 20px; }

        .celebration {
            font-size: 4rem;
            margin: 20px 0;
            animation: bounce 1s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .curriculum-section {
            background: #f9f9f9;
            border-radius: 12px;
            padding: 20px;
            margin: 20px 0;
        }

        .curriculum-section h4 {
            color: var(--primary);
            margin: 0 0 15px 0;
            padding-bottom: 10px;
            border-bottom: 2px solid var(--primary);
        }

        .word-list {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin: 15px 0;
        }

        .word-item {
            background: white;
            padding: 8px 15px;
            border-radius: 20px;
            border: 1px solid #ddd;
            font-size: 14px;
        }

        .word-item .word { font-weight: bold; color: #333; }
        .word-item .pinyin { color: #666; font-size: 12px; margin-left: 5px; }
        .word-item .meaning { color: #888; font-size: 12px; }

        .overlap-info {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 15px;
            background: #e3f2fd;
            border-radius: 8px;
            margin: 15px 0;
        }

        .overlap-badge {
            background: var(--primary);
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 14px;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }

        .empty-state h3 { color: #ccc; margin-bottom: 10px; }

        .hidden { display: none !important; }

        /* Curriculum Collapsible Lessons */
        .lesson-card {
            background: white;
            border-radius: 15px;
            margin: 20px 0;
            border: 2px solid #eee;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            overflow: hidden;
        }

        .lesson-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 25px;
            cursor: pointer;
            background: linear-gradient(135deg, #f8f9fa 0%, #fff 100%);
            transition: background 0.2s;
        }

        .lesson-header:hover {
            background: linear-gradient(135deg, #e9ecef 0%, #f8f9fa 100%);
        }

        .lesson-header-left {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .lesson-header h4 {
            margin: 0;
            color: var(--primary);
            font-size: 1.2rem;
        }

        .lesson-expand-icon {
            font-size: 1.5rem;
            transition: transform 0.3s;
            color: #666;
        }

        .lesson-card.expanded .lesson-expand-icon {
            transform: rotate(180deg);
        }

        .lesson-card.expanded .lesson-content {
            display: block;
        }

        .lesson-content {
            display: none;
            padding: 25px;
            border-top: 1px solid #eee;
        }

        .lesson-stats-bar {
            display: flex;
            gap: 20px;
            padding: 15px;
            background: #f0f7ff;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 14px;
        }

        .lesson-stat {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .lesson-stat-label {
            color: #666;
        }

        .lesson-stat-value {
            font-weight: bold;
            color: var(--primary);
        }

        .target-badge {
            background: linear-gradient(135deg, #ff9800, #f57c00);
            color: white;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .study-section, .words-section, .stroke-section, .read-section {
            margin: 20px 0;
            padding: 20px;
            background: #f9f9f9;
            border-radius: 12px;
        }

        .study-section h5, .words-section h5, .stroke-section h5, .read-section h5 {
            margin: 0 0 15px 0;
            color: #333;
            font-size: 1rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .char-section {
            margin: 25px 0;
        }

        .char-detail {
            background: white;
            border-radius: 12px;
            padding: 20px;
            margin: 15px 0;
            border: 1px solid #eee;
        }

        .char-detail-header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 15px;
        }

        .char-large {
            font-size: 4rem;
            width: 80px;
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #e0e7ff 0%, #c7d2fe 100%);
            border-radius: 12px;
        }

        .char-info {
            flex: 1;
        }

        .char-info h6 {
            margin: 0 0 5px 0;
            font-size: 1.1rem;
            color: #333;
        }

        .stroke-order-link {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 6px 12px;
            background: var(--secondary);
            color: white;
            border-radius: 6px;
            text-decoration: none;
            font-size: 12px;
            margin-top: 5px;
        }

        .stroke-order-link:hover {
            background: var(--secondary-dark);
        }

        .words-for-char {
            margin-top: 15px;
        }

        .words-for-char h6 {
            margin: 0 0 10px 0;
            color: #666;
            font-size: 0.9rem;
        }

        .word-list-inline {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .word-pill {
            display: inline-flex;
            flex-direction: column;
            padding: 8px 14px;
            background: white;
            border-radius: 8px;
            border: 1px solid #ddd;
            min-width: 80px;
        }

        .word-pill .word { font-weight: bold; font-size: 16px; color: #333; }
        .word-pill .pinyin { font-size: 11px; color: #666; }
        .word-pill .meaning { font-size: 11px; color: #888; }

        .chunk-container {
            display: flex;
            align-items: center;
            gap: 15px;
            margin: 12px 0;
            padding: 12px 15px;
            background: white;
            border-radius: 8px;
            border: 1px solid #eee;
        }

        .chunk-label {
            font-weight: bold;
            color: #666;
            min-width: 75px;
            font-size: 14px;
        }

        .chunk-chars {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .char-chip {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 8px 14px;
            background: #e0e7ff;
            border-radius: 25px;

        }

        .char-chip:hover {

        .char-chip.target {

        .target-star {

        .target-chars {

        .word-grid {

        }

        .word-chip {

            padding: 8px 14px;

        .word-text {

        .word-def {
            font-size: 11px;
            color: #888;
            max-width: 150px;

        .stroke-links {
            display: flex;

            gap: 10px;
        }

        .stroke-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 45px;
            height: 45px;
            background: linear-gradient(135deg, var(--primary), var(--purple));
            color: white;
            border-radius: 10px;
            text-decoration: none;
            font-size: 20px;
            transition: all 0.2s;
            box-shadow: 0 2px 8px rgba(102, 126, 234, 0.3);

        .stroke-btn:hover {
            transform: translateY(-2px);

        .story-preview {
            padding: 15px;
            background: white;
            border-radius: 8px;
            border: 1px solid #eee;
            font-family: monospace;
            font-size: 16px;

        .lesson-actions {
            margin-top: 20px;
            padding-top: 15px;
            border-top: 1px dashed #ddd;

        .lesson-complete {
            color: var(--secondary);
            font-weight: 600;

        /* NEW: Quiz Path Info */
        .quiz-path-info {
            margin-bottom: 20px;
        }

        .path-progress-bar {
            height: 6px;
            background: #e0e0e0;
            border-radius: 3px;
            overflow: hidden;
            margin-bottom: 10px;
        }

        .path-progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--secondary), var(--teal));
            border-radius: 3px;
            transition: width 0.3s;
        }

        .path-story-label {
            color: #666;
            font-size: 14px;
        }

        .target-tag {
            background: #ff9800;
            color: white;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 12px;
        }

        /* NEW: Apply Summary Card */
        .apply-summary-card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            margin: 25px 0;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .apply-summary-card h3 {
            margin: 0 0 20px 0;
            color: #333;
        }

        .apply-stats {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin: 20px 0;
        }

        .apply-stat {
            text-align: center;
            padding: 20px 30px;
            background: #f5f5f5;
            border-radius: 12px;
            min-width: 100px;
        }

        .apply-stat .stat-num {
            display: block;
            font-size: 2.5rem;
            font-weight: bold;
            color: #333;
        }

        .apply-stat .stat-label {
            font-size: 14px;
            color: #666;
        }

        .apply-stat.success {
            background: linear-gradient(135deg, #e8f5e9, #c8e6c9);
        }

        .apply-stat.success .stat-num {
            color: var(--secondary);
        }

        .apply-stat.warning {
            background: linear-gradient(135deg, #fff3e0, #ffe0b2);
        }

        .apply-stat.warning .stat-num {
            color: var(--warning);
        }

        .missed-warning {
            background: #fff3e0;
            border: 2px solid var(--warning);
            border-radius: 10px;
            padding: 15px;
            margin-top: 20px;
        }

        .missed-warning p {
            margin: 5px 0;
        }

        .quiz-summary-stats {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin: 25px 0;
        }

        @media (max-width: 600px) {
            .stats-grid { grid-template-columns: 1fr; }
            .quiz-options { grid-template-columns: 1fr; }
            .progress-steps { flex-wrap: wrap; gap: 15px; }
            .progress-line { display: none; }
            .step-label { font-size: 10px; max-width: 50px; }
            .apply-stats { flex-direction: column; }
            .apply-stat { width: 100%; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div>
                <h1>✨ Learning Wizard</h1>
                <p>Your guided path to reading Chinese texts</p>
            </div>
            <a href="/" class="home-btn">🏠 Home</a>
        </div>

        <div class="progress-container">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <h3 style="color: #333; margin: 0;">Your Progress</h3>
                <span id="progressText" style="color: #666; font-size: 14px;">Step 1 of 6</span>
            </div>
            <div class="progress-steps">
                <div class="progress-line">
                    <div class="progress-line-fill" id="progressFill" style="width: 0%;"></div>
                </div>
                <div class="step-indicator current" data-step="1">
                    <div class="step-circle">1</div>
                    <div class="step-label">Assessment</div>
                </div>
                <div class="step-indicator" data-step="2">
                    <div class="step-circle">2</div>
                    <div class="step-label">Set Goal</div>
                </div>
                <div class="step-indicator" data-step="3">
                    <div class="step-circle">3</div>
                    <div class="step-label">Find Paths</div>
                </div>
                <div class="step-indicator" data-step="4">
                    <div class="step-circle">4</div>
                    <div class="step-label">Curriculum</div>
                </div>
                <div class="step-indicator" data-step="5">
                    <div class="step-circle">5</div>
                    <div class="step-label">Test</div>
                </div>
                <div class="step-indicator" data-step="6">
                    <div class="step-circle">6</div>
                    <div class="step-label">Complete</div>
                </div>
            </div>
        </div>

        <div class="main-content">
            <div class="step-content" id="stepContent">
                <!-- Step content rendered dynamically -->
            </div>

            <div class="sidebar">
                <div class="summary-card">
                    <h3>📋 Session Summary</h3>
                    <div class="summary-item">
                        <span class="summary-label">Known Characters</span>
                        <span class="summary-value" id="summaryKnown">0</span>
                    </div>
                    <div class="summary-item">
                        <span class="summary-label">Target Text</span>
                        <span class="summary-value" id="summaryTarget">Not set</span>
                    </div>
                    <div class="summary-item">
                        <span class="summary-label">Characters to Learn</span>
                        <span class="summary-value highlight" id="summaryToLearn">-</span>
                    </div>
                    <div class="summary-item">
                        <span class="summary-label">Stories in Path</span>
                        <span class="summary-value" id="summaryStories">0</span>
                    </div>
                    <div class="summary-item">
                        <span class="summary-label">Quiz Score</span>
                        <span class="summary-value" id="summaryQuiz">-</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="navigation">
            <button id="backBtn" class="outline" disabled>← Back</button>
            <button id="nextBtn" disabled>Next →</button>
        </div>
    </div>

    <script>
        const WIZARD_STORAGE = {
            PATH: "mandarin_wizard_path",
            CURRICULUM: "mandarin_wizard_curriculum",
            QUIZ_RESULTS: "mandarin_wizard_quiz",
            SELECTED_CLUSTER: "mandarin_wizard_cluster"
        };

        class LearningWizard {
            constructor() {
                this.currentStep = 1;
                this.totalSteps = 6;
                this.knownChars = new Set(window.mandarinState.getCharacters());
                this.targetText = window.mandarinState.getTargetText() || '';
                this.targetChars = [];
                this.unknownChars = [];
                this.stories = [];
                this.pool = [];
                this.clusters = [];
                this.selectedCluster = null;
                this.optimizedPath = null;
                this.path = [];
                this.curriculum = [];
                this.quizResults = { correct: 0, total: 0, missed: [], correctChars: [] };
                this.currentQuiz = { index: 0, questions: [], answers: {}, perCharResult: {} };

                this.loadStories();
                this.loadPersistedData();
                this.init();
            }

            loadPersistedData() {
                try {
                    const pathData = localStorage.getItem(WIZARD_STORAGE.PATH);
                    if (pathData) {
                        const data = JSON.parse(pathData);
                        this.path = data.path || [];
                        this.optimizedPath = data.optimizedPath;
                        this.selectedCluster = data.selectedCluster;
                    }
                    
                    const curriculumData = localStorage.getItem(WIZARD_STORAGE.CURRICULUM);
                    if (curriculumData) {
                        this.curriculum = JSON.parse(curriculumData);
                    }
                } catch (e) {
                    console.log('Error loading persisted data:', e);
                }
            }

            async loadStories() {
                try {
                    const response = await fetch('/data/stories.json');
                    if (response.ok) {
                        const data = await response.json();
                        this.stories = Array.isArray(data) ? data : [];
                    }
                } catch (e) {
                    console.log('Could not load stories:', e);
                    this.stories = [];
                }
            }

            init() {
                this.updateSummary();
                this.renderStep();
                this.bindEvents();
            }

            updateSummary() {
                document.getElementById('summaryKnown').textContent = this.knownChars.size;
                document.getElementById('summaryTarget').textContent = 
                    this.targetText ? this.targetText.substring(0, 20) + '...' : 'Not set';
                document.getElementById('summaryToLearn').textContent = 
                    this.targetChars.length > 0 ? this.targetChars.length : '-';
                document.getElementById('summaryStories').textContent = this.path.length;
                document.getElementById('summaryQuiz').textContent = 
                    this.quizResults.total > 0 ? `${this.quizResults.correct}/${this.quizResults.total}` : '-';
            }

            updateProgress() {
                const progressFill = document.getElementById('progressFill');
                const progressText = document.getElementById('progressText');
                const percentage = ((this.currentStep - 1) / (this.totalSteps - 1)) * 100;
                progressFill.style.width = percentage + '%';
                progressText.textContent = `Step ${this.currentStep} of ${this.totalSteps}`;

                document.querySelectorAll('.step-indicator').forEach(indicator => {
                    const step = parseInt(indicator.dataset.step);
                    indicator.classList.remove('current', 'completed');
                    if (step < this.currentStep) {
                        indicator.classList.add('completed');
                        indicator.querySelector('.step-circle').textContent = '✓';
                    } else if (step === this.currentStep) {
                        indicator.classList.add('current');
                        indicator.querySelector('.step-circle').textContent = step;
                    } else {
                        indicator.querySelector('.step-circle').textContent = step;
                    }
                });

                document.getElementById('backBtn').disabled = this.currentStep === 1;
                document.getElementById('nextBtn').disabled = !this.canProceed();
            }

            canProceed() {
                switch (this.currentStep) {
                    case 1: return this.knownChars.size > 0;
                    case 2: return this.targetChars.length > 0;
                    case 3: return this.path.length > 0;
                    case 4: return this.curriculum.length > 0;
                    case 5: return this.quizResults.total > 0;
                    case 6: return true;
                    default: return false;
                }
            }

            renderStep() {
                const container = document.getElementById('stepContent');
                switch (this.currentStep) {
                    case 1: this.renderAssessment(container); break;
                    case 2: this.renderGoal(container); break;
                    case 3: this.renderPathfinder(container); break;
                    case 4: this.renderCurriculum(container); break;
                    case 5: this.renderTest(container); break;
                    case 6: this.renderComplete(container); break;
                }
                this.updateProgress();
            }

            bindEvents() {
                document.getElementById('backBtn').addEventListener('click', () => {
                    if (this.currentStep > 1) {
                        this.currentStep--;
                        this.renderStep();
                    }
                });

                document.getElementById('nextBtn').addEventListener('click', () => {
                    if (this.currentStep < this.totalSteps && this.canProceed()) {
                        this.onStepComplete();
                        this.currentStep++;
                        this.renderStep();
                    }
                });
            }

            onStepComplete() {
                switch (this.currentStep) {
                    case 1:
                        window.mandarinState.setCharacters(Array.from(this.knownChars));
                        break;
                    case 2:
                        window.mandarinState.setTargetText(this.targetText);
                        window.mandarinState.setTargetChars(this.targetChars);
                        break;
                    case 3:
                        const pathData = {
                            path: this.path,
                            optimizedPath: this.optimizedPath,
                            selectedCluster: this.selectedCluster,
                            clusterStories: this.selectedCluster?.stories || []
                        };
                        localStorage.setItem(WIZARD_STORAGE.PATH, JSON.stringify(pathData));
                        localStorage.setItem(WIZARD_STORAGE.SELECTED_CLUSTER, JSON.stringify(this.selectedCluster));
                        break;
                    case 5:
                        localStorage.setItem(WIZARD_STORAGE.QUIZ_RESULTS, JSON.stringify(this.quizResults));
                        break;
                }
                this.updateSummary();
            }

            extractCharacters(text) {
                const regex = /[\u4e00-\u9fff]/g;
                const matches = text.match(regex);
                return matches ? [...new Set(matches)] : [];
            }

            // ==================== STEP 1: ASSESSMENT ====================
            renderAssessment(container) {
                container.innerHTML = `
                    <h2><span class="step-num">1</span> Let's See What You Know</h2>
                    <p class="step-description">
                        Build your character knowledge base. You can extract characters from any Chinese text you've studied, 
                        or add them manually one by one.
                    </p>

                    <div class="tab-container">
                        <div class="tab-buttons">
                            <button class="tab-btn active" data-tab="extract">📄 Extract from Text</button>
                            <button class="tab-btn" data-tab="manual">✍️ Add Manually</button>
                            <button class="tab-btn" data-tab="import">📂 Import File</button>
                        </div>

                        <div id="tab-extract" class="tab-content active">
                            <textarea id="extractText" placeholder="Paste Chinese text here to extract characters...

Example:
我喜欢学习中文。今天天气很好，我们去公园散步。"></textarea>
                            <div class="button-group">
                                <button id="extractBtn" class="secondary">🔍 Extract Characters</button>
                            </div>
                            <div id="extractPreview" class="hidden"></div>
                        </div>

                        <div id="tab-manual" class="tab-content">
                            <div class="char-input-group">
                                <input type="text" id="manualCharInput" placeholder="字" maxlength="1">
                                <button id="addCharBtn" class="secondary">Add</button>
                            </div>
                            <p style="color: #666; font-size: 14px;">Type a character and press Enter or click Add</p>
                        </div>

                        <div id="tab-import" class="tab-content">
                            <p style="color: #666; margin-bottom: 15px;">
                                Import a JSON file containing your character list. This will merge with your current known set.
                            </p>
                            <input type="file" id="importFile" accept=".json" style="display: none;">
                            <button id="importBtn" class="secondary">📂 Choose File</button>
                            <button id="clearAllBtn" class="danger">🗑️ Clear All</button>
                        </div>
                    </div>

                    <div class="stats-grid">
                        <div class="stat-card">
                            <div class="stat-value" id="knownCount">${this.knownChars.size}</div>
                            <div class="stat-label">Characters Known</div>
                        </div>
                        <div class="stat-card" style="background: linear-gradient(135deg, var(--secondary) 0%, var(--secondary-dark) 100%);">
                            <div class="stat-value" id="readyWords">-</div>
                            <div class="stat-label">Words You Can Learn</div>
                        </div>
                        <div class="stat-card" style="background: linear-gradient(135deg, var(--teal) 0%, #38ef7d 100%);">
                            <div class="stat-value" id="coverage">${this.getCoverage()}%</div>
                            <div class="stat-label">Common Text Coverage</div>
                        </div>
                    </div>

                    <h3 style="margin: 25px 0 15px 0; color: #333;">Your Character Collection</h3>
                    <div id="charCollection" class="char-grid">
                        ${this.renderCharTiles()}
                    </div>
                `;

                this.bindAssessmentEvents();
            }

            renderCharTiles() {
                if (this.knownChars.size === 0) {
                    return '<p style="color: #999; padding: 20px;">No characters yet. Add some above!</p>';
                }
                return Array.from(this.knownChars).sort().map(ch => 
                    `<span class="char-tile known">${ch}</span>`
                ).join('');
            }

            bindAssessmentEvents() {
                document.querySelectorAll('.tab-btn').forEach(btn => {
                    btn.addEventListener('click', () => {
                        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                        btn.classList.add('active');
                        document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
                    });
                });

                document.getElementById('extractBtn').addEventListener('click', () => {
                    const text = document.getElementById('extractText').value;
                    if (!text.trim()) {
                        alert('Please enter some Chinese text first.');
                        return;
                    }
                    const chars = this.extractCharacters(text);
                    const newChars = chars.filter(ch => !this.knownChars.has(ch));
                    
                    const preview = document.getElementById('extractPreview');
                    preview.classList.remove('hidden');
                    preview.innerHTML = `
                        <div class="info-box">
                            <h4>Found ${chars.length} unique characters</h4>
                            <p>${newChars.length} are new to your collection.</p>
                            <div class="char-grid" style="margin-top: 10px; max-height: 150px;">
                                ${newChars.map(ch => `<span class="char-tile target">${ch}</span>`).join('')}
                            </div>
                            <div class="button-group" style="margin-top: 15px;">
                                <button id="addAllExtracted" class="secondary">➕ Add All ${newChars.length} Characters</button>
                            </div>
                        </div>
                    `;

                    document.getElementById('addAllExtracted').addEventListener('click', () => {
                        newChars.forEach(ch => this.knownChars.add(ch));
                        this.updateKnownUI();
                    });
                });

                const manualInput = document.getElementById('manualCharInput');
                document.getElementById('addCharBtn').addEventListener('click', () => this.addManualChar());
                manualInput.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') this.addManualChar();
                });

                document.getElementById('importBtn').addEventListener('click', () => {
                    document.getElementById('importFile').click();
                });

                document.getElementById('importFile').addEventListener('change', (e) => {
                    if (e.target.files.length) {
                        window.mandarinState.mergeFromFile(e.target.files[0], (err, result) => {
                            if (err) {
                                alert('Error: ' + err.message);
                            } else {
                                this.knownChars = new Set(window.mandarinState.getCharacters());
                                this.updateKnownUI();
                                alert(`Added ${result.added} characters!`);
                            }
                        });
                        e.target.value = '';
                    }
                });

                document.getElementById('clearAllBtn').addEventListener('click', () => {
                    if (confirm('Clear all known characters? This cannot be undone.')) {
                        this.knownChars.clear();
                        window.mandarinState.clear();
                        this.updateKnownUI();
                    }
                });
            }

            addManualChar() {
                const input = document.getElementById('manualCharInput');
                const ch = input.value.trim();
                if (ch && ch.length === 1) {
                    if (/[\u4e00-\u9fff]/.test(ch)) {
                        this.knownChars.add(ch);
                        this.updateKnownUI();
                        input.value = '';
                    } else {
                        alert('Please enter a Chinese character.');
                    }
                }
            }

            updateKnownUI() {
                document.getElementById('knownCount').textContent = this.knownChars.size;
                document.getElementById('charCollection').innerHTML = this.renderCharTiles();
                this.updateSummary();
                this.updateProgress();
            }

            getCoverage() {
                if (this.knownChars.size === 0) return 0;
                const common = ['的', '是', '了', '我', '在', '有', '和', '人', '这', '中', '大', '为', '上', '个', '们', '来', '到', '时', '说', '们'];
                const known = common.filter(ch => this.knownChars.has(ch)).length;
                return Math.round((known / common.length) * 100);
            }

            // ==================== STEP 2: GOAL ====================
            renderGoal(container) {
                container.innerHTML = `
                    <h2><span class="step-num">2</span> What Do You Want to Read?</h2>
                    <p class="step-description">
                        Paste the Chinese text you want to learn to read. We'll analyze which characters you already know 
                        and identify the learning gap.
                    </p>

                    <textarea id="targetTextInput" placeholder="Paste your target Chinese text here...

Example:
北京是中国的首都。今天天气很好，我们去公园散步。故宫是一个很美丽的地方。">${this.targetText}</textarea>
                    
                    <div class="button-group">
                        <button id="analyzeBtn" class="secondary">🔍 Analyze Text</button>
                        <button id="loadFromKnownBtn" class="outline">📥 Use Target from Shared</button>
                        <button id="clearTargetBtn" class="danger">🗑️ Clear</button>
                    </div>

                    <div id="analysisResults" class="hidden">
                        <div class="stats-grid">
                            <div class="stat-card">
                                <div class="stat-value" id="pctKnown">0%</div>
                                <div class="stat-label">% Known (Occurrences)</div>
                            </div>
                            <div class="stat-card">
                                <div class="stat-value" id="pctUnique">0%</div>
                                <div class="stat-label">% Known (Unique)</div>
                            </div>
                            <div class="stat-card" style="background: linear-gradient(135deg, var(--warning) 0%, #f57c00 100%);">
                                <div class="stat-value" id="gapCount">0</div>
                                <div class="stat-label">Characters to Learn</div>
                            </div>
                        </div>

                        <div id="targetCharsSection" class="hidden">
                            <h3 style="margin: 25px 0 15px 0; color: #333;">📝 Characters to Learn</h3>
                            <p style="color: #666; font-size: 14px; margin-bottom: 15px;">
                                Click any character to mark it as known (moves it to your known set)
                            </p>
                            <div id="targetCharsGrid" class="char-grid"></div>
                        </div>

                        <div class="info-box" id="readabilityAdvice"></div>
                    </div>
                `;

                this.bindGoalEvents();
            }

            bindGoalEvents() {
                document.getElementById('analyzeBtn').addEventListener('click', () => this.analyzeTarget());
                document.getElementById('loadFromKnownBtn').addEventListener('click', () => {
                    const saved = window.mandarinState.getTargetText();
                    if (saved) {
                        document.getElementById('targetTextInput').value = saved;
                        this.analyzeTarget();
                    } else {
                        alert('No target text found in shared state.');
                    }
                });
                document.getElementById('clearTargetBtn').addEventListener('click', () => {
                    document.getElementById('targetTextInput').value = '';
                    document.getElementById('analysisResults').classList.add('hidden');
                    this.targetText = '';
                    this.targetChars = [];
                    this.unknownChars = [];
                    this.updateSummary();
                    this.updateProgress();
                });
            }

            analyzeTarget() {
                const text = document.getElementById('targetTextInput').value.trim();
                if (!text) {
                    alert('Please enter some text to analyze.');
                    return;
                }

                this.targetText = text;
                const allChars = this.extractCharacters(text);
                this.targetChars = allChars;
                
                const knownSet = new Set(this.knownChars);
                this.unknownChars = allChars.filter(ch => !knownSet.has(ch));

                const totalOccurrences = text.replace(/[^\u4e00-\u9fff]/g, '').length;
                const knownOccurrences = allChars.filter(ch => knownSet.has(ch)).length;
                
                const pctKnown = totalOccurrences > 0 ? Math.round((knownOccurrences / allChars.length) * 100) : 0;
                const pctUnique = allChars.length > 0 ? Math.round(((allChars.length - this.unknownChars.length) / allChars.length) * 100) : 0;

                document.getElementById('pctKnown').textContent = pctKnown + '%';
                document.getElementById('pctUnique').textContent = pctUnique + '%';
                document.getElementById('gapCount').textContent = this.unknownChars.length;

                const targetGrid = document.getElementById('targetCharsGrid');
                targetGrid.innerHTML = this.unknownChars.map(ch => 
                    `<span class="char-tile unknown" data-char="${ch}">${ch}</span>`
                ).join('');

                targetGrid.querySelectorAll('.char-tile').forEach(tile => {
                    tile.addEventListener('click', () => {
                        const ch = tile.dataset.char;
                        this.knownChars.add(ch);
                        this.unknownChars = this.unknownChars.filter(c => c !== ch);
                        tile.remove();
                        
                        const newCount = this.unknownChars.length;
                        document.getElementById('gapCount').textContent = newCount;
                        document.getElementById('pctUnique').textContent = 
                            allChars.length > 0 ? Math.round(((allChars.length - newCount) / allChars.length) * 100) + '%' : '0%';
                        
                        this.updateSummary();
                        this.updateProgress();
                    });
                });

                document.getElementById('targetCharsSection').classList.remove('hidden');
                document.getElementById('analysisResults').classList.remove('hidden');

                const advice = document.getElementById('readabilityAdvice');
                if (pctUnique >= 90) {
                    advice.innerHTML = '<h4>🎉 Excellent!</h4><p>You know almost all the characters. This text is very readable for you!</p>';
                } else if (pctUnique >= 70) {
                    advice.innerHTML = '<h4>👍 Good</h4><p>You know most characters. A bit of study and you\'ll be reading this fluently!</p>';
                } else if (pctUnique >= 50) {
                    advice.innerHTML = '<h4>📚 Challenging</h4><p>This text has a moderate learning curve. Our pathfinder will find good intermediate texts.</p>';
                } else {
                    advice.innerHTML = '<h4>🎯 Ambitious Goal</h4><p>This is a challenging text, but we\'ll break it down into manageable steps!</p>';
                }

                this.updateSummary();
                this.updateProgress();
            }

            // ==================== STEP 3: PATHFINDER (NEW ALGORITHM) ====================
            renderPathfinder(container) {

                const generatePoolBtn = document.getElementById('generatePoolBtn');

            generatePool() {
                const knownSet = this.knownChars;
                const targetSet = new Set(this.targetChars);
                const limit = knownSet.size + (2 * targetSet.size);

                this.pool = [];

                for (const story of this.stories) {
                    const chars = story.characters || [];
                    const uniqueChars = [...new Set(chars)];

                    if (uniqueChars.length > limit) continue;

                    const knownChars = uniqueChars.filter(c => knownSet.has(c));
                    const unknownChars = uniqueChars.filter(c => !knownSet.has(c));
                    const targetChars = unknownChars.filter(c => targetSet.has(c));
                    const nontargetChars = unknownChars.filter(c => !targetSet.has(c));

                    if (nontargetChars.length > targetChars.length) continue;

                    this.pool.push({
                        story: story,
                        uniqueChars: uniqueChars,
                        knownChars: knownChars,
                        unknownChars: unknownChars,
                        targetChars: targetChars,
                        nontargetChars: nontargetChars,
                        jumpsize: unknownChars.length,
                        efficiency: targetChars.length / (targetChars.length + nontargetChars.length)
                    });
                }

                const poolStats = document.getElementById('poolStats');
                poolStats.style.display = 'block';
                poolStats.className = 'file-status success';
                poolStats.innerHTML = '<strong>✅ Pool:</strong> ' + this.pool.length + ' candidates';

                document.getElementById('clusterSection').style.display = 'block';
                this.selectedClusterSize = 5;
            }

            findClusters() {
                if (!this.pool || this.pool.length === 0) {
                    alert('Generate pool first.');
                    return;
                }

                const k = this.selectedClusterSize || 5;
                if (k > this.pool.length) {
                    alert('Reduce cluster size.');
                    return;
                }

                const targetSet = new Set(this.targetChars);
                const totalTargets = targetSet.size;

                document.getElementById('clusterResults').style.display = 'block';
                document.getElementById('clusterResults').innerHTML = '<p>🔄 Finding clusters...</p>';

                const self = this;
                setTimeout(function() {
                    const combinations = self.getCombinations([...Array(self.pool.length).keys()], k);
                    const clusterResults = [];

                    for (const combo of combinations) {
                        const stories = combo.map(i => self.pool[i]);
                        
                        const unionTarget = new Set();
                        const unionNontarget = new Set();
                        
                        for (const s of stories) {
                            for (const c of s.targetChars) unionTarget.add(c);
                            for (const c of s.nontargetChars) unionNontarget.add(c);
                        }

                        const coverage = (unionTarget.size / totalTargets) * 100;
                        const efficiency = unionTarget.size / (unionTarget.size + unionNontarget.size);

                        clusterResults.push({
                            combo: combo,
                            stories: stories,
                            unionTargetSize: unionTarget.size,
                            unionNontargetSize: unionNontarget.size,
                            coverage: coverage,
                            efficiency: efficiency,
                            avgJumpsize: stories.reduce((sum, s) => sum + s.jumpsize, 0) / stories.length
                        });
                    }

                    clusterResults.sort((a, b) => b.efficiency - a.efficiency);
                    self.clusters = clusterResults.slice(0, 10);

                    let html = '';
                    for (let i = 0; i < self.clusters.length; i++) {
                        const c = self.clusters[i];
                        html += '<div class="cluster-option" data-index="' + i + '" style="background: white; border: 2px solid #ddd; border-radius: 12px; padding: 15px; margin: 10px 0; cursor: pointer;">' +
                            '<div style="display: flex; justify-content: space-between;"><div><strong>Option ' + (i + 1) + '</strong></div>' +
                            '<div>Coverage: <strong>' + c.coverage.toFixed(1) + '%</strong> | Efficiency: <strong>' + (c.efficiency * 100).toFixed(1) + '%</strong></div></div>' +
                            '<div style="font-size: 12px; color: #666;">' + c.stories.map(s => s.story.title || 'Untitled').join(' → ') + '</div></div>';
                    }

                    document.getElementById('clusterResults').innerHTML = html;

                    document.querySelectorAll('.cluster-option').forEach(function(opt) {
                        opt.addEventListener('click', function() {
                            self.selectCluster(parseInt(opt.dataset.index));
                            document.querySelectorAll('.cluster-option').forEach(o => o.style.borderColor = '#ddd');
                            opt.style.borderColor = 'var(--secondary)';
                        });
                    });
                }, 10);
            }

            selectCluster(index) {
                this.selectedCluster = this.clusters[index];
                const c = this.selectedCluster;
                
                document.getElementById('clusterDetailSection').style.display = 'block';
                document.getElementById('selectedClusterInfo').innerHTML = 
                    '<div class="info-box" style="background: #e8f5e9; border-color: #4CAF50;">' +
                    '<h4>📊 Statistics</h4>' +
                    '<div>Coverage: <strong>' + c.coverage.toFixed(1) + '%</strong> | Efficiency: <strong>' + (c.efficiency * 100).toFixed(1) + '%</strong></div>' +
                    '<div>Avg Jumpsize: <strong>' + c.avgJumpsize.toFixed(1) + '</strong></div></div>' +
                    '<h4>📚 Stories</h4>' + c.stories.map((s, i) =>

            optimizePathExhaustive() {
                if (!this.selectedCluster) {
                    alert('Select a cluster first.');
                    return;
                }

                const stories = this.selectedCluster.stories;
                const targetSet = new Set(this.targetChars);
                const totalTargets = targetSet.size;

                document.getElementById('optimizedPathStats').innerHTML = '<p>🔄 Finding optimal path...</p>';

                const self = this;
                setTimeout(function() {
                    const permutations = self.getPermutations(stories);
                    let bestPath = null;
                    let bestAvgJumpsize = Infinity;

                    for (const perm of permutations) {
                        const knownSoFar = new Set(self.knownChars);
                        const jumpsizes = [];
                        const coveredTargets = new Set();

                        for (const story of perm) {
                            const newChars = story.unknownChars.filter(c => !knownSoFar.has(c));
                            const newTargets = story.targetChars.filter(c => targetSet.has(c) && !knownSoFar.has(c));
                            
                            jumpsizes.push(newChars.length);
                            newChars.forEach(c => knownSoFar.add(c));
                            newTargets.forEach(c => coveredTargets.add(c));
                        }

                        const avgJumpsize = jumpsizes.reduce((a, b) => a + b, 0) / jumpsizes.length;

                        if (avgJumpsize < bestAvgJumpsize) {
                            bestAvgJumpsize = avgJumpsize;
                            bestPath = { perm: perm, jumpsizes: jumpsizes, avgJumpsize: avgJumpsize, coveredTargets: coveredTargets };
                        }
                    }

                    self.optimizedPath = bestPath;

                    let html = '<div class="info-box" style="background: #e8f5e9; border-color: #4CAF50;">' +
                        '<h4>⚡ Best Path</h4>' +
                        '<div>Avg Jumpsize: <strong>' + bestPath.avgJumpsize.toFixed(2) + '</strong></div>' +
                        '<div>Coverage: <strong>' + (bestPath.coveredTargets.size / totalTargets * 100).toFixed(1) + '%</strong></div></div>';

                    const knownSoFar = new Set(self.knownChars);
                    html += '<ul class="path-list">';
                    for (let i = 0; i < bestPath.perm.length; i++) {
                        const story = bestPath.perm[i];
                        const newChars = story.unknownChars.filter(c => !knownSoFar.has(c));
                        newChars.forEach(c => knownSoFar.add(c));
                        html += '<li class="path-item"><div class="path-number">' + (i+1) + '</div><div class="path-info"><h4>' + (story.story.title || 'Untitled') + '</h4><p>Jumpsize: ' + bestPath.jumpsizes[i] + '</p></div></li>';
                    }
                    html += '</ul>';

                    document.getElementById('pathSection').style.display = 'block';
                    document.getElementById('optimizedPathStats').innerHTML = html;

                    self.path = bestPath.perm.map(s => ({
                        id: s.story.id,
                        title: s.story.title,
                        source: s.story.source,
                        content: s.story.content,
                        chars: s.story.characters,
                        newChars: s.unknownChars,
                        targetChars: s.targetChars
                    }));

                    self.updateSummary();
                    self.updateProgress();
                }, 10);
            }

            getCombinations(arr, size) {
                const result = [];
                function combine(start, combo) {
                    if (combo.length === size) { result.push(combo); return; }
                    for (let i = start; i < arr.length; i++) combine(i + 1, [...combo, arr[i]]);
                }
                combine(0, []);
                return result;
            }

            getPermutations(arr) {
                if (arr.length <= 1) return [arr];
                const result = [];
                for (let i = 0; i < arr.length; i++) {
                    const rest = [...arr.slice(0, i), ...arr.slice(i + 1)];
                    for (const perm of this.getPermutations(rest)) result.push([arr[i], ...perm]);
                }
                return result;
            }

            renderPathList() {
                if (this.path.length === 0) {
                    return '<p style="color: #999;">No optimal path found. Some characters may be unreachable.</p>';
                }

                const overlapInfo = this.path.map((story, i) => {
                    if (i === 0) return { fromPrev: 0, newThis: story.newChars.length };
                    const prevChars = new Set(this.path[i-1].newChars);
                    const overlap = story.newChars.filter(ch => prevChars.has(ch)).length;
                    return { fromPrev: overlap, newThis: story.newChars.length };
                });

                return `

                                <div class="path-stats">

                                        <div class="label">New Chars</div>

            async loadFullStories() {
                try {
                    const response = await fetch('/data/stories.json');
                    if (response.ok) return await response.json();
                } catch (e) {}
                return [];
            }

            async loadDictionary() {
                try {
                    const response = await fetch('/data/dictionary.json');
                    if (response.ok) return await response.json();
                } catch (e) {}
                return [];
            }

            extractWordsFromText(text) {
                const words = [];
                let i = 0;
                while (i < text.length) {
                    let matched = false;
                    for (let len = 4; len >= 2; len--) {
                        if (i + len <= text.length) {
                            const word = text.slice(i, i + len);
                            if (/[\u4e00-\u9fff]/.test(word)) {
                                const chars = word.split('');
                                const allChinese = chars.every(c => /[\u4e00-\u9fff]/.test(c));
                                if (allChinese && !words.some(w => w.word === word)) {
                                    words.push(word);
                                    matched = true;
                                    break;
                                }
                            }
                        }
                    }
                    i++;
                }
                return words;
            }

            async findWordsForChar(char, knownChars, limit = 5) {
                const dict = await this.loadDictionary();
                const knownSet = new Set(knownChars);
                const words = [];
                
                for (const entry of dict) {
                    if (!entry.word || !entry.chars) continue;
                    if (!entry.word.includes(char)) continue;
                    
                    const wordChars = entry.chars.split('');
                    const allKnown = wordChars.every(c => knownSet.has(c) || c === char);
                    
                    if (allKnown) {
                        words.push({
                            word: entry.word,
                            pinyin: entry.pinyin || '',
                            definition: entry.definition || entry.english || ''
                        });
                        if (words.length >= limit) break;
                    }
                }
                
                return words;
            }

            async generateCurriculumForPath() {
                this.curriculum = [];
                const fullStories = await this.loadFullStories();
                const targetSet = new Set(this.targetChars);
                
                let cumulativeKnown = new Set(this.knownChars);
                
                for (let i = 0; i < this.path.length; i++) {
                    const storyItem = this.path[i];
                    const fullStory = fullStories.find(s => s.id === storyItem.id) || {};
                    
                    const storyChars = new Set(storyItem.chars || []);
                    const newCharsThisLesson = [...storyChars].filter(c => !cumulativeKnown.has(c));
                    const targetCharsThisLesson = newCharsThisLesson.filter(c => targetSet.has(c));
                    
                    const content = fullStory.content || storyItem.content || '';
                    const wordsInStory = this.extractWordsFromText(content);
                    
                    const charWordMap = {};
                    for (const char of newCharsThisLesson) {
                        const words = await this.findWordsForChar(char, cumulativeKnown, 5);
                        charWordMap[char] = words;
                    }
                    
                    this.curriculum.push({
                        index: i,
                        storyId: storyItem.id,
                        title: storyItem.title || 'Story ' + (i + 1),
                        content: content,
                        newChars: newCharsThisLesson,
                        targetChars: targetCharsThisLesson,
                        knownBefore: [...cumulativeKnown],
                        charWordMap: charWordMap,
                        wordsInStory: wordsInStory.slice(0, 30),
                        isTarget: false
                    });
                    
                    newCharsThisLesson.forEach(c => cumulativeKnown.add(c));
                }
                
                const coveredTargets = new Set();
                this.curriculum.forEach(l => {
                    l.targetChars.forEach(c => coveredTargets.add(c));
                });
                const remainingTargets = this.targetChars.filter(c => !coveredTargets.has(c));
                
                if (remainingTargets.length > 0) {
                    const charWordMap = {};
                    for (const char of remainingTargets) {
                        const words = await this.findWordsForChar(char, cumulativeKnown, 5);
                        charWordMap[char] = words;
                    }
                    
                    this.curriculum.push({
                        index: this.curriculum.length,
                        storyId: 'target',
                        title: 'Your Target Text',
                        content: this.targetText,
                        newChars: remainingTargets,
                        targetChars: remainingTargets,
                        knownBefore: [...cumulativeKnown],
                        charWordMap: charWordMap,
                        wordsInStory: this.extractWordsFromText(this.targetText).slice(0, 30),
                        isTarget: true
                    });
                }
                
                localStorage.setItem(WIZARD_STORAGE.CURRICULUM, JSON.stringify(this.curriculum));
            }

                        <div class="lesson-content">
