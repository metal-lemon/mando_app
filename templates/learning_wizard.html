                                            </a>
                                        </div>
                                    </div>
                                    <div class="words-for-char">
                                        <h6>5 Words (using ${ch} with known characters):</h6>
                                        <div class="word-list-inline">
                                            ${(lesson.charWordMap[ch] || []).map(w => `
                                                <div class="word-pill">
                                                    <span class="word">${w.word}</span>
                                                    ${w.pinyin ? `<span class="pinyin">${w.pinyin}</span>` : ''}
                                                    ${w.definition ? `<span class="meaning">${w.definition.substring(0, 30)}${w.definition.length > 30 ? '...' : ''}</span>` : ''}
                                                </div>
                                            `).join('')}
                                            ${(lesson.charWordMap[ch] || []).length === 0 ? '<span style="color: #999;">No words found</span>' : ''}
                                        </div>
                                    </div>
                                </div>
                            `).join('') : '<p style="color: #999;">No new characters in this lesson.</p>'}
                            
                            <div class="words-section">
                                <h5>📝 Words from This Text (${lesson.wordsInStory ? lesson.wordsInStory.length : 0})</h5>
                                <p style="color: #666; font-size: 14px; margin-bottom: 15px;">
                                    Words extracted from the story text.
                                </p>
                                <div class="word-list-inline">
                                    ${(lesson.wordsInStory && lesson.wordsInStory.length > 0) ? lesson.wordsInStory.map(w => `
                                        <div class="word-pill">
                                            <span class="word">${w}</span>
                                        </div>
                                    `).join('') : '<span style="color: #999;">No words extracted</span>'}
                                </div>
                            </div>
                            
                            <div class="read-section">
                                <h5>📖 Read: ${lesson.title}</h5>
                                <div class="story-preview" style="background: white; padding: 20px; border-radius: 10px; line-height: 2; font-size: 16px;">
                                    ${lesson.content.substring(0, 300)}${lesson.content.length > 300 ? '...' : ''}
                                </div>
                                ${lesson.content.length > 300 ? `
                                    <p style="color: #666; margin-top: 10px; font-size: 14px;">
                                        (Story continues... ${lesson.content.length} characters total)
                                    </p>
                                ` : ''}
                            </div>
                            
                            <div class="lesson-actions" style="margin-top: 20px; padding-top: 20px; border-top: 1px solid #eee;">
                                <p style="color: #666; font-size: 14px;">
                                    ✅ Study this lesson, then read the story. After completing, proceed to Step 5 to test your knowledge.
                                </p>
                            </div>
                        </div>
                    </div>
                `).join('');
            }

            // ==================== STEP 5: TEST ====================
            async renderTest(container) {
                if (!container) return;
                
                if (this.quizResults.total === 0 && this.currentQuiz.questions.length === 0) {
                    await this.startQuiz();
                }

                if (this.currentQuiz.index >= this.currentQuiz.questions.length) {
                    this.showQuizResults(container);
                    return;
                }

                const q = this.currentQuiz.questions[this.currentQuiz.index];
                const userSelection = q.userSelection || [];

                container.innerHTML = `
                    <h2><span class="step-num">5</span> Test Your Knowledge</h2>
                    <p class="step-description">
                        Click on ALL characters you recognize. These characters come from your learning path.
                    </p>
                    
                    <div class="quiz-path-info">
                        <div class="path-progress-bar">
                            <div class="path-progress-fill" style="width: ${(this.currentQuiz.index / this.currentQuiz.questions.length) * 100}%"></div>
                        </div>
                        <p class="path-story-label">
                            ${q.storyTitle ? `From: <strong>${q.storyTitle}</strong>` : 'General Review'}
                            ${q.isTarget ? ' <span class="target-tag">★ Target</span>' : ''}
                        </p>
                    </div>

                    <div class="quiz-container">
                        <div class="quiz-progress">
                            <div style="display: flex; justify-content: space-between; margin-bottom: 5px;">
                                <span style="color: #666;">Question</span>
                                <span style="color: #666;">${this.currentQuiz.index + 1} / ${this.currentQuiz.questions.length}</span>
                            </div>
                            <div class="progress-bar">
                                <div class="progress-fill" style="width: ${(this.currentQuiz.index / this.currentQuiz.questions.length) * 100}%;"></div>
                            </div>
                        </div>

                        <div class="quiz-card">
                            <p style="color: #666; margin-bottom: 15px; font-size: 14px;">
                                Click the characters you <strong>know</strong> from your learning path.
                                Don't click the ones you don't recognize!
                            </p>
                            
                            <div class="quiz-char-grid">
                                ${q.options.map((char, idx) => `
                                    <div class="quiz-char-option ${userSelection.includes(char) ? 'selected' : ''}" 
                                         data-char="${char}" data-idx="${idx}">
                                        ${char}
                                    </div>
                                `).join('')}
                            </div>
                            
                            <div class="quiz-hint">
                                <span>Selected: <strong id="selectedCount">${userSelection.length}</strong> of ${q.targets.length}</span>
                            </div>
                        </div>

                        <div class="quiz-nav">
                            <button id="skipBtn" class="outline">Skip</button>
                            <button id="submitBtn" class="secondary">Submit Answer</button>
                            <button id="nextQuestionBtn" disabled>Next →</button>
                        </div>
                    </div>
                `;

                this.bindQuizEvents();
            }

            shuffle(array) {
                const arr = [...array];
                for (let i = arr.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [arr[i], arr[j]] = [arr[j], arr[i]];
                }
                return arr;
            }

            async startQuiz() {
                const allNewChars = [];
                const charSet = new Set();
                
                const orderedStories = this.optimizedPath?.perm || this.path;
                
                for (const storyItem of orderedStories) {
                    const unknownChars = storyItem.unknownChars || storyItem.newChars || [];
                    for (const char of unknownChars) {
                        if (!charSet.has(char)) {
                            charSet.add(char);
                            allNewChars.push({
                                char: char,
                                storyIndex: orderedStories.indexOf(storyItem),
                                storyTitle: storyItem.story?.title || storyItem.title || 'Story',
                                isTarget: this.targetChars.includes(char)
                            });
                        }
                    }
                }
                
                let hskChars = [];
                try {
                    const response = await fetch('/data/hsk_characters.json');
                    if (response.ok) {
                        const data = await response.json();
                        hskChars = data.all || [];
                    }
                } catch (e) {
                    console.log('Could not load HSK characters:', e);
                    hskChars = ['的', '是', '了', '我', '在', '有', '和', '人', '这', '中', '大', '为', '上', '个', '们', '来', '时', '年', '国', '会', '出', '也', '子', '得', '她', '地', '前', '道', '业', '生', '把', '外', '政', '行', '所', '家', '后', '儿', '经', '进', '面', '关', '点', '定', '天', '分', '还', '下', '用', '发', '心', '只', '么', '起', '都', '好', '小', '部', '其', '些', '当', '样', '现', '应', '最', '重', '间', '女', '真', '被', '文', '但', '身', '公', '义', '从', '像'];
                }
                
                const excluded = new Set([...charSet, ...this.knownChars]);
                let availableDistractors = hskChars.filter(c => !excluded.has(c));
                
                if (availableDistractors.length < 15) {
                    availableDistractors = [...availableDistractors, ...hskChars.filter(c => !charSet.has(c))];
                    availableDistractors = [...new Set(availableDistractors)];
                }
                
                const pairs = [];
                for (let i = 0; i < allNewChars.length; i += 2) {
                    if (i + 1 < allNewChars.length) {
                        pairs.push([allNewChars[i], allNewChars[i + 1]]);
                    } else {
                        pairs.push([allNewChars[i]]);
                    }
                }
                
                const questions = pairs.map((pair, idx) => {
                    const targets = pair.map(p => p.char);
                    const numDistractors = 5 - targets.length;
                    const shuffledDistractors = this.shuffle(availableDistractors);
                    const distractors = shuffledDistractors.slice(0, numDistractors);
                    
                    const allOptions = this.shuffle([...targets, ...distractors]);
                    
                    return {
                        id: idx,
                        targets: targets,
                        distractors: distractors,
                        options: allOptions,
                        userSelection: [],
                        storyTitle: pair[0].storyTitle,
                        isTarget: pair.some(p => p.isTarget)
                    };
                });
                
                const maxQuestions = Math.min(15, questions.length);
                const sample = questions.slice(0, maxQuestions);
                
                this.currentQuiz = {
                    index: 0,
                    questions: sample,
                    answers: {},
                    perCharResult: {}
                };
            }

            bindQuizEvents() {
                document.querySelectorAll('.quiz-char-option').forEach(opt => {
                    opt.addEventListener('click', () => {
                        const char = opt.dataset.char;
                        const q = this.currentQuiz.questions[this.currentQuiz.index];
                        
                        if (!q.userSelection) q.userSelection = [];
                        
                        const idx = q.userSelection.indexOf(char);
                        if (idx > -1) {
                            q.userSelection.splice(idx, 1);
                            opt.classList.remove('selected');
                        } else {
                            q.userSelection.push(char);
                            opt.classList.add('selected');
                        }
                        
                        document.getElementById('selectedCount').textContent = q.userSelection.length;
                    });
                });

                document.getElementById('skipBtn').addEventListener('click', () => {
                    const q = this.currentQuiz.questions[this.currentQuiz.index];
                    q.userSelection = [];
                    this.currentQuiz.index++;
                    this.renderStep();
                });

                document.getElementById('submitBtn').addEventListener('click', () => {
                    const q = this.currentQuiz.questions[this.currentQuiz.index];
                    const selected = q.userSelection || [];
                    const targets = q.targets;
                    
                    const correctSelection = targets.every(t => selected.includes(t));
                    const noWrongSelection = selected.every(s => targets.includes(s));
                    const isFullyCorrect = correctSelection && noWrongSelection;
                    
                    q.isCorrect = isFullyCorrect;
                    q.partialCorrect = correctSelection && !noWrongSelection;
                    
                    document.querySelectorAll('.quiz-char-option').forEach(opt => {
                        const char = opt.dataset.char;
                        opt.classList.remove('selected');
                        if (targets.includes(char)) {
                            opt.classList.add('correct-answer');
                        } else if (selected.includes(char)) {
                            opt.classList.add('wrong-answer');
                        }
                    });
                    
                    document.getElementById('submitBtn').disabled = true;
                    document.getElementById('nextQuestionBtn').disabled = false;
                    
                    if (q.isCorrect) {
                        const feedback = document.createElement('div');
                        feedback.className = 'quiz-feedback success';
                        feedback.textContent = '✓ Perfect! You selected exactly the right characters!';
                        document.querySelector('.quiz-card').appendChild(feedback);
                    } else if (q.partialCorrect) {
                        const feedback = document.createElement('div');
                        feedback.className = 'quiz-feedback partial';
                        feedback.textContent = `⚠ Good start! You knew ${selected.filter(s => targets.includes(s)).length} of ${targets.length} characters.`;
                        document.querySelector('.quiz-card').appendChild(feedback);
                    } else {
                        const feedback = document.createElement('div');
                        feedback.className = 'quiz-feedback incorrect';
                        const known = selected.filter(s => targets.includes(s)).length;
                        const wrong = selected.filter(s => !targets.includes(s)).length;
                        let msg = '';
                        if (known > 0) msg += `You knew ${known} character(s). `;
                        if (wrong > 0) msg += `But ${wrong} was not from your learning path.`;
                        feedback.textContent = msg || '✗ Those characters are not from your learning path.';
                        document.querySelector('.quiz-card').appendChild(feedback);
                    }
                });

                document.getElementById('nextQuestionBtn').addEventListener('click', () => {
                    if (this.currentQuiz.index < this.currentQuiz.questions.length) {
                        this.currentQuiz.index++;
                        this.renderStep();
                    }
                });
            }

            showQuizResults(container) {
                let fullyCorrect = 0;
                let partialCorrect = 0;
                const missedChars = new Set();
                const correctChars = new Set();
                
                for (const q of this.currentQuiz.questions) {
                    if (q.isCorrect) {
                        fullyCorrect++;
                        q.targets.forEach(t => correctChars.add(t));
                    } else if (q.partialCorrect) {
                        partialCorrect++;
                        q.targets.forEach(t => {
                            if (q.userSelection.includes(t)) {
                                correctChars.add(t);
                            } else {
                                missedChars.add(t);
                            }
                        });
                    } else {
                        q.targets.forEach(t => missedChars.add(t));
                    }
                }

                this.quizResults = {
                    correct: fullyCorrect,
                    partial: partialCorrect,
                    total: this.currentQuiz.questions.length,
                    missed: Array.from(missedChars),
                    correctChars: Array.from(correctChars)
                };

                localStorage.setItem(WIZARD_STORAGE.QUIZ_RESULTS, JSON.stringify(this.quizResults));
                this.updateSummary();

                const totalCorrect = fullyCorrect + partialCorrect;
                const pct = Math.round((totalCorrect / this.currentQuiz.questions.length) * 100);
                let message = '';
                if (pct >= 80) message = 'Great job! You\'re ready to continue.';
                else if (pct >= 60) message = 'Good progress! Review the missed characters.';
                else message = 'Keep practicing! Review the curriculum and try again.';

                container.innerHTML = `
                    <h2><span class="step-num">5</span> Test Complete!</h2>
                    
                    <div class="completion-card" style="background: linear-gradient(135deg, var(--primary) 0%, var(--purple) 100%);">
                        <div class="celebration">${pct >= 80 ? '🎉' : '📚'}</div>
                        <h2>${totalCorrect} / ${this.currentQuiz.questions.length}</h2>
                        <p>${pct}% correct • ${message}</p>
                    </div>

                    <div class="quiz-summary-stats">
                        <div class="stat-card" style="background: linear-gradient(135deg, var(--secondary) 0%, var(--secondary-dark) 100%);">
                            <div class="stat-value">${correctChars.size}</div>
                            <div class="stat-label">Chars Known</div>
                        </div>
                        <div class="stat-card" style="background: linear-gradient(135deg, var(--warning) 0%, #f57c00 100%);">
                            <div class="stat-value">${missedChars.size}</div>
                            <div class="stat-label">Need Practice</div>
                        </div>
                    </div>

                    ${missedChars.size > 0 ? `
                        <h3 style="margin: 25px 0 15px 0; color: #333;">Characters to Review</h3>
                        <div class="char-grid">
                            ${Array.from(missedChars).map(ch => `<span class="char-tile unknown">${ch}</span>`).join('')}
                        </div>
                        <p style="color: #666; margin-top: 10px;">
                            These characters will NOT be added to your known set. Review them and try again!
                        </p>
                    ` : ''}

                    <div class="button-group" style="margin-top: 25px;">
                        <button id="retryQuizBtn" class="outline">🔄 Retry Quiz</button>
                        <button id="practiceMissedBtn" class="secondary" ${missedChars.size === 0 ? 'disabled' : ''}>✏️ Practice Missed</button>
                    </div>
                `;

                document.getElementById('retryQuizBtn').addEventListener('click', () => {
                    this.quizResults = { correct: 0, partial: 0, total: 0, missed: [], correctChars: [] };
                    this.currentQuiz = { index: 0, questions: [], answers: {}, perCharResult: {} };
                    this.renderStep();
                });

                document.getElementById('practiceMissedBtn').addEventListener('click', async () => {
                    const missedArr = Array.from(missedChars);
                    if (missedArr.length > 0) {
                        this.currentQuiz.questions = missedArr.map((c, idx) => {
                            const isTarget = this.targetChars.includes(c);
                            return {
                                id: idx,
                                targets: [c],
                                distractors: [],
                                options: [c],
                                userSelection: [],
                                storyTitle: 'Review',
                                isTarget: isTarget
                            };
                        });
                        this.currentQuiz.index = 0;
                        this.currentQuiz.answers = {};
                        this.currentQuiz.perCharResult = {};
                        this.renderStep();
                    }
                });

                this.updateProgress();
            }

            // ==================== STEP 6: COMPLETE ====================
            renderComplete(container) {
                const correctChars = this.quizResults.correctChars || [];
                const missed = this.quizResults.missed || [];
                const totalLearned = correctChars.length;
                const pctKnown = this.quizResults.total > 0 
                    ? Math.round((this.quizResults.correct / this.quizResults.total) * 100) 
                    : 0;

                container.innerHTML = `
                    <h2><span class="step-num">6</span> Apply Your Learning</h2>
                    <p class="step-description">
                        Based on your quiz results, you can now add the characters you demonstrated knowledge of
                        to your known character set.
                    </p>

                    <div class="completion-card">
                        <div class="celebration">🎊</div>
                        <h2>Learning Session Complete!</h2>
                        <p>You've completed this learning session.</p>
                    </div>

                    <div class="apply-summary-card">
                        <h3>📊 Quiz Results Summary</h3>
                        <div class="apply-stats">
                            <div class="apply-stat success">
                                <span class="stat-num">${correctChars.length}</span>
                                <span class="stat-label">Know</span>
                            </div>
                            <div class="apply-stat warning">
                                <span class="stat-num">${missed.length}</span>
                                <span class="stat-label">Need Practice</span>
                            </div>
                            <div class="apply-stat">
                                <span class="stat-num">${this.path.length}</span>
                                <span class="stat-label">Stories</span>
                            </div>
                        </div>
                        
                        ${missed.length > 0 ? `
                            <div class="missed-warning">
                                <p>⚠️ <strong>${missed.length} characters</strong> were not answered correctly in the quiz.</p>
                                <p>These will NOT be added to your known set.</p>
                            </div>
                        ` : ''}
                    </div>

                    ${correctChars.length > 0 ? `
                        <div class="curriculum-section" style="margin-top: 25px;">
                            <h4>✨ Characters to Add to Your Known Set</h4>
                            <div class="char-grid">
                                ${correctChars.map(ch => `<span class="char-tile known">${ch}</span>`).join('')}
                            </div>
                        </div>
                    ` : ''}

                    ${missed.length > 0 ? `
                        <div class="curriculum-section" style="margin-top: 25px; border-color: var(--warning);">
                            <h4>📚 Characters Needing More Practice</h4>
                            <p style="color: #666; font-size: 14px; margin-bottom: 10px;">
                                Review these characters and try the quiz again before adding them.
                            </p>
                            <div class="char-grid">
                                ${missed.map(ch => `<span class="char-tile unknown">${ch}</span>`).join('')}
                            </div>
                        </div>
                    ` : ''}

                    <div class="button-group" style="margin-top: 25px;">
                        <button id="addToKnownBtn" class="secondary" ${correctChars.length === 0 ? 'disabled' : ''}>
                            ✨ Add ${correctChars.length} Characters to Known Set
                        </button>
                        <button id="retryMissedBtn" class="outline" ${missed.length === 0 ? 'disabled' : ''}>
                            🔄 Retry Missed Characters
                        </button>
                        <button id="exportSessionBtn" class="outline">📤 Export Session</button>
                        <button id="startNewBtn">🔄 Start New Session</button>
                    </div>

                    <div id="addedStatus" class="file-status success hidden" style="margin-top: 20px;"></div>
                `;

                this.bindCompleteEvents();
            }

            bindCompleteEvents() {
                document.getElementById('addToKnownBtn')?.addEventListener('click', () => {
                    const correctChars = this.quizResults.correctChars || [];
                    const missed = this.quizResults.missed || [];
                    
                    correctChars.forEach(ch => this.knownChars.add(ch));
                    window.mandarinState.setCharacters(Array.from(this.knownChars));
                    
                    const statusDiv = document.getElementById('addedStatus');
                    statusDiv.classList.remove('hidden');
                    statusDiv.innerHTML = `
                        <h4>✅ Added ${correctChars.length} Characters!</h4>
                        <p>Your known character count is now: <strong>${this.knownChars.size}</strong></p>
                        ${missed.length > 0 ? `
                            <p style="margin-top: 10px;">Don't worry about the ${missed.length} missed characters - 
                            keep practicing and try again!</p>
                        ` : ''}
                    `;
                    
                    document.getElementById('addToKnownBtn').disabled = true;
                    document.getElementById('addToKnownBtn').textContent = '✓ Added!';
                    
                    this.updateSummary();
                });

                document.getElementById('retryMissedBtn')?.addEventListener('click', () => {
                    const missed = this.quizResults.missed || [];
                    if (missed.length > 0) {
                        this.currentQuiz.questions = missed.map((c, idx) => ({
                            id: idx,
                            targets: [c],
                            distractors: [],
                            options: [c],
                            userSelection: [],
                            storyTitle: 'Review',
                            isTarget: this.targetChars.includes(c)
                        }));
                        this.currentQuiz.index = 0;
                        this.currentQuiz.answers = {};
                        this.currentQuiz.perCharResult = {};
                        this.quizResults = { correct: 0, partial: 0, total: 0, missed: [], correctChars: [] };
                        this.currentStep = 5;
                        this.renderStep();
                    }
                });

                document.getElementById('exportSessionBtn')?.addEventListener('click', () => {
                    const sessionData = {
                        date: new Date().toISOString(),
                        knownChars: Array.from(this.knownChars),
                        targetText: this.targetText,
                        learnedChars: this.quizResults.correctChars || [],
                        missedChars: this.quizResults.missed || [],
                        path: this.path,
                        curriculum: this.curriculum,
                        quizResults: this.quizResults
                    };
                    
                    const blob = new Blob([JSON.stringify(sessionData, null, 2)], { type: 'application/json' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `learning_session_${new Date().toISOString().slice(0,10)}.json`;
                    a.click();
                    URL.revokeObjectURL(url);
                });

                document.getElementById('startNewBtn')?.addEventListener('click', () => {
                    if (confirm('Start a new learning session? Current progress will be saved.')) {
                        this.resetWizard();
                    }
                });
            }

            resetWizard() {
                this.targetText = '';
                this.targetChars = [];
                this.unknownChars = [];
                this.path = [];
                this.curriculum = [];
                this.pool = [];
                this.clusters = [];
                this.selectedCluster = null;
                this.optimizedPath = null;
                this.quizResults = { correct: 0, total: 0, missed: [], correctChars: [] };
                this.currentQuiz = { index: 0, questions: [], answers: {}, perCharResult: {} };
                
                localStorage.removeItem(WIZARD_STORAGE.PATH);
                localStorage.removeItem(WIZARD_STORAGE.CURRICULUM);
                localStorage.removeItem(WIZARD_STORAGE.QUIZ_RESULTS);
                localStorage.removeItem(WIZARD_STORAGE.SELECTED_CLUSTER);
                
                this.currentStep = 1;
                this.updateSummary();
                this.renderStep();
            }
        }

        const wizard = new LearningWizard();
    </script>
</body>
